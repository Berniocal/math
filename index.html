  if(!raw.includes('=')){box.innerHTML='<div class="muted">Nejdřív zadej logaritmickou rovnici s rovnítkem.</div>';return;}

  const ts=adjustableLogTokens(raw);
  if(ts.length<1){box.innerHTML='<div class="muted">Nenašel jsem žádné číslo, které smím změnit. Základy logaritmů se nemění.</div>';return;}
  if(ts.length>GENERATOR_MAX_TOKENS){box.innerHTML='<div class="muted">Příklad je pro bezpečné generování příliš složitý. Zkus jednodušší tvar nebo méně čísel.</div>';return;}

  const {minCoeff,maxCoeff}=coeffLimits();
  const vals=[];
  for(let i=-maxCoeff;i<=maxCoeff;i++){
    if(i!==0 && Math.abs(i)>=minCoeff) vals.push(String(i));
  }
  // U logaritmů zde záměrně nepřidáváme nulu ani zlomkové koeficienty typu 1/2.
  // Mohly by z výrazu ax+b udělat tvar 1/2x+b nebo složený zlomek a porušit ověření výsledku.

  lastGeneratedCalc='';
  let target=null;
  const started=nowMs();
  let repeatedFallbackCalc='';
  let repeatedFallbackTarget=null;

  // Nejdřív zkusíme přesný dopočet jednoho číselného tokenu pro zadaný kořen.
  // Tohle je důležité pro tvary jako 2*logbase(5,x)-logbase(5,2)=2,
  // kde je logaritmus násoben koeficientem. Náhodné zkoušení se zde často netrefí,
  // ale rovnice je vzhledem k tomuto koeficientu lineární a jde dopočítat přímo.
  for(let targetIndex=0; targetIndex<targets.length && !lastGeneratedCalc; targetIndex++){
    target=targets[targetIndex];
    if(target===null || !Number.isFinite(target)) continue;
    for(let attempt=0; attempt<GENERATOR_SINGLE_ROOT_MAX_ATTEMPTS && !lastGeneratedCalc; attempt++){
      if(await generatorShouldStop(started,attempt)) break;
      const adjIndex=Math.floor(Math.random()*ts.length);
      const fixedValues={};
      ts.forEach((t,i)=>{ if(i!==adjIndex) fixedValues[i]=mutate(t.value,d); });

      const sys=coefficientRowsForTargets(raw,ts,[adjIndex],fixedValues,[target]);
      if(!sys || !sys.rows.length || sys.rows.length!==1) continue;
      const sol=solveLinearSystemNumeric(sys.rows,sys.rhs);
      if(!sol || !Number.isFinite(sol[0])) continue;

      const txt=niceNumberString(sol[0]);
      if(txt===null || txt==='0') continue;
      if(!coefficientAllowedValue(parseSimpleCoeffValue(txt),false)) continue;

      const vals=ts.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:txt);
      vals[adjIndex]=txt;
      const cand=repl(raw,ts.map((t,i)=>({t,v:String(vals[i])})));
      if(hasChangedLogBases(raw,cand)) continue;
      if(!candidateRespectsCurrentCoeffLimits(cand)) continue;
      if(!logarithmicCandidateReallyHasTargetRoot(cand,target)) continue;

      if(isRepeatedGeneratedCandidate(cand)){
        if(!repeatedFallbackCalc){
          repeatedFallbackCalc=cand;
          repeatedFallbackTarget=target;
        }
        continue;
      }

      lastGeneratedCalc=cand;
      break;
    }
    if(generatorTimedOut(started)) break;
  }

  // Původní náhodné hledání necháváme jako zálohu pro tvary, kde přímý lineární
  // dopočet jednoho tokenu nestačí.
  for(let targetIndex=0; targetIndex<targets.length && !lastGeneratedCalc; targetIndex++){
    target=targets[targetIndex];
    if(target===null || !Number.isFinite(target)) continue;
    for(let attempt=0; attempt<GENERATOR_SINGLE_ROOT_MAX_ATTEMPTS && !lastGeneratedCalc; attempt++){
      if(await generatorShouldStop(started,attempt)) break;
      const adj=ts[Math.floor(Math.random()*ts.length)];
      for(const c of vals){
        if(generatorTimedOut(started)) break;
        const replacements=ts.map(t=>({
          t,
          v:(t===adj?c:mutate(t.value,d))
        }));
        const cand=repl(raw,replacements);
        if(hasChangedLogBases(raw,cand)) continue;
        if(!candidateRespectsCurrentCoeffLimits(cand)) continue;
        if(!logarithmicCandidateReallyHasTargetRoot(cand,target)) continue;

        if(isRepeatedGeneratedCandidate(cand)){
          if(!repeatedFallbackCalc){
            repeatedFallbackCalc=cand;
            repeatedFallbackTarget=target;
          }
          continue;
        }

        lastGeneratedCalc=cand;
        break;
      }
    }
    if(generatorTimedOut(started)) break;
  }

  if(!lastGeneratedCalc && repeatedFallbackCalc){
    lastGeneratedCalc=repeatedFallbackCalc;
    target=repeatedFallbackTarget;
  }

  // Když už nejde najít novou bezpečnou variantu, raději zopakujeme dřívější platnou.
  // Nikdy kvůli neopakování nepřekračujeme min/max koeficienty a nikdy nepřijmeme rovnici
  // bez ověření, že má skutečně požadovaný kořen.
  if(!lastGeneratedCalc){
    const fallback=repeatedValidLogFallback(raw,targets);
    if(fallback){
      lastGeneratedCalc=fallback.calc;
      target=fallback.target;
    }
  }

  if(!lastGeneratedCalc){
    box.innerHTML='<div class="muted">Nepodařilo se najít variantu v nastavených mezích koeficientů, jejíž skutečný kořen je zadaný nebo hezky zvolený výsledek.</div>';
    return;
  }
  lastGeneratedCalc=prettifyUnitCoefficientsCalc(lastGeneratedCalc);
  rememberGeneratedCandidate(lastGeneratedCalc);
  lastGeneratedLatex=calcToLatexSimple(lastGeneratedCalc);

  let rootInfo='';
  try{
    const [gl,gr]=splitTopLevelEquation(lastGeneratedCalc);

    // U logaritmických kvadratických rovnic nestačí ukázat jen target,
    // podle kterého se rovnice našla. Po vygenerování vždy znovu spočítáme
    // všechny skutečné kořeny a u logaritmů je zkusíme zapsat hezky
    // jako mocniny základu: např. 5^{-3/4} místo desetinného čísla.
    let roots=[];
    try{ roots=solveSingleLogQuadraticBySubstitution(gl,gr,'x'); }catch(e){ roots=[]; }
    if(!roots.length){
      roots=solveAllNumericRootsRobust(gl,gr,'x');
    }
    roots=dedupeRoots(roots);

    if(roots.length>1){
      rootInfo='<div class="muted">Kořeny: \\('+inlineRootsForLogEquation(gl,gr,'x',roots)+'\\)</div>';
    }else if(roots.length===1){
      rootInfo='<div class="muted">Kořen: \\('+inlineRootsForLogEquation(gl,gr,'x',roots)+'\\)</div>';
    }else{
      rootInfo='<div class="muted">Kontrola: pro \\(x='+fmtLatexNumber(target)+'\\) rovnice vychází. Základ logaritmu zůstal stejný.</div>';
    }
  }catch(e){
    rootInfo='<div class="muted">Kontrola: pro \\(x='+fmtLatexNumber(target)+'\\) rovnice vychází. Základ logaritmu zůstal stejný.</div>';
  }
  box.innerHTML='\\['+lastGeneratedLatex+'\\]'+rootInfo+'<div class="muted">Základy logaritmů se neměnily.</div>';
  if(window.MathJax)await MathJax.typesetPromise([box]);
}


function isFastValidAbsCandidate(left,right,x){
  if(!Number.isFinite(x)) return false;
  try{
    if(isForbiddenPoint(left,right,x)) return false;
    return isValidEquationRoot(left,right,x);
  }catch(e){
    return false;
  }
}

function splitTopLevelOnce(s,op){
  let depth=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='(') depth++;
    else if(c===')') depth--;
    else if(depth===0 && s.slice(i,i+op.length)===op){
      return [s.slice(0,i),s.slice(i+op.length)];
    }
  }
  return null;
}
function stripOuterParens(s){
  s=String(s||'').trim();
  let changed=true;
  while(changed && s.startsWith('(') && s.endsWith(')')){
    changed=false;
    let depth=0, ok=true;
    for(let i=0;i<s.length;i++){
      if(s[i]==='(') depth++;
      if(s[i]===')') depth--;
      if(depth===0 && i<s.length-1){ok=false;break;}
    }
    if(ok){s=s.slice(1,-1).trim();changed=true;}
  }
  return s;
}
function splitTopLevelFactors(s){
  const out=[]; let depth=0, last=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='(') depth++;
    else if(c===')') depth--;
    else if(depth===0 && c==='*'){
      out.push(s.slice(last,i)); last=i+1;
    }
  }
  out.push(s.slice(last));
  return out.map(x=>x.trim()).filter(Boolean);
}
function splitTopLevelTerms(s){
  const out=[]; let depth=0, last=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='(') depth++;
    else if(c===')') depth--;
    else if(depth===0 && (c==='+' || c==='-') && i>last){
      out.push(s.slice(last,i));
      last=i;
    }
  }
  out.push(s.slice(last));
  return out.map(x=>x.trim()).filter(Boolean);
}
function hasTopLevelPlusMinus(s){
  let depth=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='(') depth++;
    else if(c===')') depth--;
    else if(depth===0 && (c==='+' || c==='-') && i>0) return true;
  }
  return false;
}
function parseFunctionCall(expr,name){
  expr=String(expr||'').trim();
  const head=name+'(';
  if(!expr.startsWith(head) || !expr.endsWith(')')) return null;
  const inner=expr.slice(head.length,-1);
  const args=[];
  let depth=0,start=0;
  for(let i=0;i<inner.length;i++){
    const c=inner[i];
    if(c==='(') depth++;
    else if(c===')') depth--;
    else if(c===',' && depth===0){ args.push(inner.slice(start,i)); start=i+1; }
  }
  args.push(inner.slice(start));
  return {name,args};
}
function exprToLatexGenerated(expr, context="normal") {
  expr=String(expr||'').trim();
  // Pojistka jen pro vykreslení generátoru: když se v calc zápisu objeví 2logbase(...),
  // MathJax by z toho udělal obyčejná písmena. Pro LaTeX převod z toho uděláme 2*logbase(...).
  expr=expr.replace(/[·⋅×]/g,'*')
           .replace(/(\d|\))(?=(?:logbase|log|ln)\s*\()/g,'$1*')
           // Implicitní násobení v generovaném calc zápisu: 3(logbase(...))^2, 2(x+1), )(
           // Bez toho se logbase uvnitř mocniny nepřevede a MathJax vykreslí obyčejný text.
           .replace(/(\d|\))(?=\()/g,'$1*');
  // V generovaném LaTeXu nechceme proměnnou zbytečně jako (x)^2.
  // Zápis (x)^(2) převádíme jen vizuálně na x^2; výpočty se nemění.
  expr=expr.replace(/\(([a-zA-Z])\)\s*\^\s*\(?\s*(\d+)\s*\)?/g,'$1^$2');
  // Po vizuálním zjednodušení mocnin ještě znovu smažeme jednotkové koeficienty.
  // Bez toho zůstávalo například -1*(x)^(2) jako -1x^2 nebo 1\cdot x^2.
  expr=prettifyUnitCoefficientsCalc(expr);
  if(!expr) return '';

  const beforeStrip=expr;
  expr=stripOuterParens(expr);
  const wasWrapped=expr!==beforeStrip;

  // Chirurgická pojistka pro znaménko těsně před logaritmem.
  // Bez ní výraz jako -logbase(5,x) nezačne řetězcem logbase(, takže by se
  // nepřevedl na \log_{5}(x) a MathJax by vykreslil obyčejné písmo „logbase“.
  if((expr.startsWith('-') || expr.startsWith('+')) && /^(?:logbase|log|ln)\s*\(/.test(expr.slice(1).trim())){
    const sign=expr[0];
    const rest=expr.slice(1).trim();
    return (sign==='-'?'-':'+')+exprToLatexGenerated(rest, context);
  }

  const logBaseCall=parseFunctionCall(expr,'logbase');
  if(logBaseCall && logBaseCall.args.length===2){
    return '\\log_{'+exprToLatexGenerated(logBaseCall.args[0], 'suppressWrap')+'}\\left('+exprToLatexGenerated(logBaseCall.args[1], 'suppressWrap')+'\\right)';
  }

  const commonLogCall=parseFunctionCall(expr,'log');
  if(commonLogCall && commonLogCall.args.length===1){
    return '\\log\\left('+exprToLatexGenerated(commonLogCall.args[0], 'suppressWrap')+'\\right)';
  }

  const lnCall=parseFunctionCall(expr,'ln');
  if(lnCall && lnCall.args.length===1){
    return '\\ln\\left('+exprToLatexGenerated(lnCall.args[0], 'suppressWrap')+'\\right)';
  }

  const absCall=parseFunctionCall(expr,'abs');
  if(absCall && absCall.args.length===1){
    return '\\left| '+exprToLatexGenerated(absCall.args[0], 'suppressWrap')+' \\right|';
  }

  const frac=splitTopLevelOnce(expr,'/');
  if(frac) return '\\frac{'+exprToLatexGenerated(frac[0], 'suppressWrap')+'}{'+exprToLatexGenerated(frac[1], 'suppressWrap')+'}';

  const terms=splitTopLevelTerms(expr);
  if(terms.length>1){
    const rendered=terms.map((t,i)=>{
      if(i===0) return exprToLatexGenerated(t);
      if(t.startsWith('+')) return '+'+exprToLatexGenerated(t.slice(1));
      if(t.startsWith('-')) return '-'+exprToLatexGenerated(t.slice(1));
      return '+'+exprToLatexGenerated(t);
    }).join('');
    return (wasWrapped && context!=='suppressWrap') ? '\\left('+rendered+'\\right)' : rendered;
  }

  const factors=splitTopLevelFactors(expr);
  if(factors.length>1){
    const rendered=factors.map(f=>{
      const part=exprToLatexGenerated(f);
      // Záporný činitel za násobením má být čitelně v závorce: 5\cdot \left(-2\right), ne 5\cdot -2.
      const plainFactor=stripOuterParens(String(f).trim());
      return plainFactor.startsWith('-') ? '\\left('+part+'\\right)' : part;
    }).join('\\cdot ');
    return (wasWrapped && context!=='suppressWrap') ? '\\left('+rendered+'\\right)' : rendered;
  }

  // Mocnina na konci výrazu, např. (x)^(2), x^2 nebo (x-1)^2.
  let depth=0;
  for(let i=expr.length-1;i>=0;i--){
    const c=expr[i];
    if(c===')') depth++;
    else if(c==='(') depth--;
    else if(depth===0 && c==='^'){
      const base=expr.slice(0,i);
      const exp=stripOuterParens(expr.slice(i+1));
      const rendered='{'+exprToLatexGenerated(base)+'}^{'+exprToLatexGenerated(exp)+'}';
      return (wasWrapped && context!=='suppressWrap') ? '\\left('+rendered+'\\right)' : rendered;
    }
  }

  expr=expr.replace(/<=/g,'\\le ')
           .replace(/>=/g,'\\ge ')
           .replace(/pi/g,'\\pi ')
           .replace(/Infinity/g,'\\infty ')
           .replace(/sqrt\(([^()]*)\)/g,'\\sqrt{$1}');

  // Hezké implicitní násobení koeficientu a proměnné.
  expr=expr.replace(/(\d+)\*([a-zA-Z])/g,'$1$2');
  return (wasWrapped && context!=='suppressWrap' && hasTopLevelPlusMinus(expr)) ? '\\left('+expr+'\\right)' : expr;
}

function prettifyUnitCoefficientsCalc(s){
  return String(s||'')
    // 1x, 1*x, 1x^2, 1*x^(2) -> x, x^2; stejně pro -1x -> -x.
    // Nezasahuje do čísel typu 10x, protože před jedničkou nesmí být číslice.
    .replace(/(^|[^0-9A-Za-z_])(-?)1\*?([a-zA-Z](?:_\d+)?(?:\^\(?\d+\)?)?)/g,(m,p,sg,v)=>p+(sg?'-':'')+v)
    .replace(/\+\-/g,'-')
    .replace(/--/g,'+');
}
function cleanupCopiedLatex(s){
  return String(s||'')
    .replace(/\\left\(([a-zA-Z0-9]+)\\right\)\^\{/g,'$1^{')
    .replace(/\(([a-zA-Z0-9]+)\)\^\{/g,'$1^{')
    .replace(/\{([a-zA-Z0-9]+)\}\^\{/g,'$1^{')
    .replace(/\\left\(([a-zA-Z0-9]+)\\right\)_\{/g,'$1_{')
    .replace(/\(([a-zA-Z0-9]+)\)_\{/g,'$1_{')
    .replace(/\{([a-zA-Z0-9]+)\}_\{/g,'$1_{');
}
function calcToLatexSimple(s){
  let out=prettifyUnitCoefficientsCalc(s);
  out=out.replace(/−/g,'-');
  const opMatch=out.match(/(<=|>=|<|>|=)/);
  let result;
  if(opMatch){
    const op=opMatch[1];
    const left=out.slice(0,opMatch.index);
    const right=out.slice(opMatch.index+op.length);
    const opLatex=op==='<= إ'?'\\le ':op; // never used, keeps minifier away
    const map={ '<=':'\\le ', '>=':'\\ge ', '<':'<', '>':'>', '=':'=' };
    result=exprToLatexGenerated(left)+map[op]+exprToLatexGenerated(right);
  }else{
    result=exprToLatexGenerated(out);
  }
  return cleanupCopiedLatex(result);
}

function calcToLatexSimpleKeepUnitCoeff(s){
  // Zachováno jen kvůli případným starším voláním; i tady už se jednotkový koeficient nemaže výjimkou.
  return calcToLatexSimple(s);
}

function base64UrlEncodeUtf8(text){
  const bytes=new TextEncoder().encode(text);
  let bin='';
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64UrlDecodeUtf8(text){
  text=String(text||'').replace(/-/g,'+').replace(/_/g,'/');
  while(text.length%4) text+='=';
  const bin=atob(text);
  const bytes=new Uint8Array([...bin].map(ch=>ch.charCodeAt(0)));
  return new TextDecoder().decode(bytes);
}
function getEditorUrlData(){
  const hash=String(window.location.hash||'');
  if(hash.startsWith('#eq=')) return hash.slice(4);
  return new URLSearchParams(window.location.search).get('eq');
}
function syncEditorToUrl(){
  try{
    const url=new URL(window.location.href);
    // Kratší odkaz: ukládá se jen výpočetní zápis, ne celý JSON strom editoru.
    // Hash funguje i při otevření jako file:// a GitHub Pages/PWA ho neupravuje.
    url.searchParams.delete('eq');
    url.hash=root.length ? 'eq='+encodeURIComponent(calcA(root)) : '';
    history.replaceState(null,'',url.toString());
  }catch(e){
    try{
      window.location.hash=root.length ? 'eq='+encodeURIComponent(calcA(root)) : '';
    }catch(_e){}
  }
}
function loadEditorFromUrl(){
  try{
    const data=getEditorUrlData();
    if(!data)return;

    // Nový krátký formát: #eq=x%5E2-5*x%3D6
    let raw=decodeURIComponent(data);

    // Zpětná kompatibilita se starším dlouhým formátem, kde byl uložen JSON v base64url.
    try{
      const parsed=JSON.parse(base64UrlDecodeUtf8(data));
      if(parsed && Array.isArray(parsed.root)){
        root=parsed.root;
        path=[];
        cursor=root.length;
        return;
      }
    }catch(_oldFormat){}

    root=calcTextToNodes(raw);
    path=[];

}

function currentArrayTextTail(maxLen=8){
  const a=arr();
  let out='';
  let count=0;
  for(let i=cursor-1;i>=0 && count<maxLen;i--){
    const n=a[i];
    if(!n || n.type!=='text') break;
    out=String(n.v)+out;
    count++;
  }
  return out;
}

function removePreviousTextNodes(count){
  const a=arr();
  save();
  for(let i=0;i<count;i++){
    if(cursor>0 && a[cursor-1] && a[cursor-1].type==='text'){
      a.splice(cursor-1,1);
      cursor--;
    }
  }
}

function tryAutoConvertTypedWords(){
  const tail=currentArrayTextTail(8).toLowerCase();

  // log -> logaritmus se základem a argumentem
  if(tail.endsWith('log')){
    removePreviousTextNodes(3);
    const a=arr();
    a.splice(cursor,0,{type:'logbase',base:[],body:[]});
    path.push(cursor,'base');
    cursor=0;
    render();updateDebug();
    return;
  }

  // sqrt -> odmocnina
  if(tail.endsWith('sqrt')){
    removePreviousTextNodes(4);
    const a=arr();
    a.splice(cursor,0,{type:'sqrt',body:[]});
    path.push(cursor,'body');
    cursor=0;
    render();updateDebug();
    return;
  }

  // pi nebo pí -> skutečné π; výpočetně zůstává „pi“
  if(tail.endsWith('pi')){
    removePreviousTextNodes(2);
    const a=arr();
    a.splice(cursor,0,{type:'text',v:'pi'});
    cursor++;
    render();updateDebug();
    return;
  }
  if(tail.endsWith('pí')){
    removePreviousTextNodes(2);
    const a=arr();
    a.splice(cursor,0,{type:'text',v:'pi'});
    cursor++;
    render();updateDebug();
    return;
  }
}

function keyboardFractionFromSlash(){

  if(cursor>0){

function verticalMoveInStructure(direction){
  if(!path.length) return false;
  const p=path.slice();
  const last=p[p.length-1];

  function setTo(newPath){
    const oldCursor=cursor;
    path=newPath;
    const len=arr().length;
    cursor=Math.min(oldCursor,len);
    render();
    return true;
  }

  // obyčejný zlomek: top <-> bottom
  if(last==='top' || last==='bottom'){
    const np=p.slice();
    np[np.length-1]=(last==='top')?'bottom':'top';
    return setTo(np);
  }

  // smíšené číslo má cestu ... frac top/bottom
  if(p.length>=2 && (last==='top'||last==='bottom') && p[p.length-2]==='frac'){
    const np=p.slice();
    np[np.length-1]=(last==='top')?'bottom':'top';
    return setTo(np);
  }

  // exponent: nahoru do exponentu, dolů zpět na základ / ven
  if(last==='base' && direction<0){ const np=p.slice(); np[np.length-1]='sup'; return setTo(np); }
  if(last==='sup' && direction>0){ const np=p.slice(); np[np.length-1]='base'; return setTo(np); }

  return false;
}

function handlePhysicalKeyboard(e){
  if(isTypingInFormElement(e)) return;
  if(e.ctrlKey || e.metaKey || e.altKey) return;

  const key=e.key;
  const printable=key.length===1;
  const navKeys=['Backspace','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Delete','Escape','Tab'];
  if(!printable && !navKeys.includes(key)) return;

  physicalFocusEditor();

  if(key==='Backspace'){
    e.preventDefault();
    backspaceKey();
    return;
  }
  if(key==='Delete'){
    e.preventDefault();
    const a=arr();
    if(cursor<a.length){save();a.splice(cursor,1);render();updateDebug();}
    return;
  }
  if(key==='Enter'){
    e.preventDefault();
    insertRootNewlineFromKeyboard();
    return;
  }
  if(key==='ArrowLeft'){
    e.preventDefault();
    move(-1);
    return;
  }
  if(key==='ArrowRight'){
    e.preventDefault();
    move(1);
    return;
  }
  if(key==='ArrowUp'){
    e.preventDefault();
    if(!verticalMoveInStructure(-1)) move(-1);
    return;
  }
  if(key==='ArrowDown'){
    e.preventDefault();
    if(!verticalMoveInStructure(1)) move(1);
    return;
  }
  if(key==='Escape'){
    e.preventDefault();
    hideKb();hidePopover();
    return;
  }
  if(key==='Tab'){
    e.preventDefault();
    if(path.length) exitBox(); else move(1);
    return;
  }

  if(printable){
    e.preventDefault();
    if(key==='d'){ insSub(''); return; }
    if(key==='/'){ keyboardFractionFromSlash(); return; }
    if(key==='^' || key==='u'){ keyboardPowerFromCaret(); return; }
    if(key==='(' || key==='[' || key==='{'){ keyboardParen(key); return; }
    if(key===')' || key===']' || key==='}'){ keyboardCloseBracket(key); return; }
    if(key==='*'){ insText('*'); return; }
    if(key==='+' || key==='-' || key==='=' || key==='<' || key==='>') { insText(key); return; }
    if(/[0-9a-zA-ZáčďéěíňóřšťúůýžÁČĎÉĚÍŇÓŘŠŤÚŮÝŽ.,]/.test(key)){
      insertPlainCharacterFromKeyboard(key);
      return;
    }
    if(key==='π'){
      insertPlainCharacterFromKeyboard('π');
      return;
    }
  }
}

function latexToCalcText(latex){
  let s=String(latex||'').trim();

  s=s.replace(/^\s*\\\[/,'').replace(/\\\]\s*$/,'');
  s=s.replace(/^\s*\\\(/,'').replace(/\\\)\s*$/,'');
  s=s.replace(/^\s*\$\$/,'').replace(/\$\$\s*$/,'');
  s=s.replace(/^\s*\$/,'').replace(/\$\s*$/,'');

  s=s.replace(/\r/g,'\n');
  s=s.replace(/\\begin\{(?:aligned|array|cases|matrix)\}/g,'');
  s=s.replace(/\\end\{(?:aligned|array|cases|matrix)\}/g,'');
  s=s.replace(/\\\\/g,'\n');
  s=s.replace(/&/g,'');

  s=s.replace(/\\left/g,'').replace(/\\right/g,'');
  s=s.replace(/\\,/g,'').replace(/\\;/g,'').replace(/\\!/g,'').replace(/\\:/g,'');
  s=s.replace(/\s+/g,'');

  function convertAbsBarsInLatexText(str){
    let out='', stack=[];
    for(let i=0;i<str.length;i++){
      if(str[i]==='|'){
        if(stack.length){
          out+=')';
          stack.pop();
        }else{
          out+='abs(';
          stack.push('|');
        }
      }else{
        out+=str[i];
      }
    }
    return out;
  }
  s=convertAbsBarsInLatexText(s);

  s=s.replace(/\\cdot|\\times/g,'*');
  s=s.replace(/[·⋅×]/g,'*');
  s=s.replace(/\\div/g,'/');
  s=s.replace(/\\pi/g,'pi');
  s=s.replace(/\\infty/g,'Infinity');
  s=s.replace(/\\leq|\\le/g,'<=');
  s=s.replace(/\\geq|\\ge/g,'>=');
  s=s.replace(/\\neq|\\ne/g,'!=');
  s=s.replace(/\\sin/g,'sin');
  s=s.replace(/\\cos/g,'cos');
  s=s.replace(/\\tan/g,'tan');
  s=s.replace(/\\cot/g,'cot');
  s=s.replace(/\\log_\{([^{}]+)\}\(([^()]+)\)/g,'logbase($1,$2)');
  s=s.replace(/\\log_([0-9a-zA-Z]+)\(([^()]+)\)/g,'logbase($1,$2)');
  s=s.replace(/\\log/g,'log');
  s=s.replace(/\\ln/g,'ln');

  function readGroup(str,i){
    if(str[i]!=='{') return {body:str[i]||'', end:i+1};
    let depth=1, j=i+1, body='';
    while(j<str.length){
      if(str[j]==='{') depth++;
      else if(str[j]==='}'){
        depth--;
        if(depth===0) break;
      }
      body+=str[j];
      j++;
    }
    return {body,end:j+1};
  }

  function convertSpecial(str){
    let out='', i=0;
    while(i<str.length){
      if(str.startsWith('\\frac',i)){
        i+=5;
        const top=readGroup(str,i);
        const bot=readGroup(str,top.end);
        out+='(('+convertSpecial(top.body)+')/('+convertSpecial(bot.body)+'))';
        i=bot.end;
      }else if(str.startsWith('\\sqrt',i)){
        i+=5;
        if(str[i]==='['){
          let j=i+1, idx='';
          while(j<str.length && str[j]!==']'){idx+=str[j];j++;}
          const body=readGroup(str,j+1);
          out+='('+convertSpecial(body.body)+')^(1/('+convertSpecial(idx)+'))';
          i=body.end;
        }else{
          const body=readGroup(str,i);
          out+='sqrt('+convertSpecial(body.body)+')';
          i=body.end;
        }
      }else{
        out+=str[i];
        i++;
      }
    }
    return out;
  }

  s=convertSpecial(s);
  s=s.replace(/\{/g,'(').replace(/\}/g,')');
  s=s.replace(/\^\(([^()]*)\)/g,'^($1)');
  s=s.replace(/\^([0-9a-zA-Z]+)/g,'^($1)');
  s=s.replace(/_\(([^()]*)\)/g,'_$1');
  s=s.replace(/_([0-9a-zA-Z]+)/g,'_$1');
  s=s.replace(/\\/g,'');
  return s;
}

function pasteLatexIntoEditor(e){
  const text=e.clipboardData?.getData('text/plain') || '';
  if(!text.trim()) return;

  const looksLatex=/\\frac|\\sqrt|\\left|\\right|\\cdot|\\times|\\le|\\ge|\\pi|\\begin|\^|_\{/.test(text);
  if(!looksLatex) return;

  e.preventDefault();
  try{

    root=calcTextToNodes(calcText);

    cursor=root.length;
    render();
    updateDebug();
    showKb();
  }catch(err){
    alert('LaTeX se nepodařilo převést.');
  }
