<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#f3f3f3;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#111}
.top{padding:18px 16px 8px;font-size:34px;font-weight:900}
.editorWrap{padding:12px}
.editor{background:white;border-radius:28px;min-height:230px;padding:22px;font-size:34px;line-height:1.7;display:flex;flex-wrap:wrap;align-items:center;align-content:flex-start;gap:2px;box-shadow:0 2px 12px #0001;cursor:text}
.editor.empty:after{content:"Klikni sem a napiš rovnici";color:#999;font-size:24px}.lineBreak{flex-basis:100%;height:0}
.cur{width:2px;height:44px;background:#111;animation:blink 1s step-end infinite;margin:0 2px;display:inline-block;vertical-align:middle}.sup .cur,.sub .cur{height:24px;min-width:2px}@keyframes blink{50%{opacity:0}}
.tok{display:inline-flex;align-items:center;justify-content:center}.box{min-width:36px;min-height:34px;border:2px dotted #888;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;padding:2px 4px;margin:1px}.box.active{border-color:#2563eb;background:#eaf1ff}
.frac{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;vertical-align:middle;margin:0 6px}.ft,.fb{min-width:42px;min-height:28px;display:flex;align-items:center;justify-content:center}.fl{width:100%;min-width:46px;height:2px;background:#111}
.sqrt{display:inline-flex;align-items:center;gap:2px;margin:0 4px}.sqrtSym{font-size:46px;line-height:.8}.sqrtBody{border-top:2px solid #111;min-width:40px;padding-top:2px}.supw,.subw{display:inline-flex;align-items:center}.sup,.sub{font-size:.6em;min-width:26px;min-height:24px}.sup{transform:translateY(-14px)}.sub{transform:translateY(14px)}.par{font-size:1.3em}
.panel{margin:12px;background:white;border-radius:24px;padding:14px;box-shadow:0 2px 12px #0001;display:grid;gap:12px}.title{font-weight:900;font-size:22px}.row{display:grid;grid-template-columns:1fr auto;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}.targetGrid{display:flex;flex-wrap:wrap;gap:8px}.coeffGrid{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.labeledInput{display:flex;align-items:center;gap:6px;background:#f7f7f7;border:1px solid #ddd;border-radius:16px;padding:6px 8px}.labeledInput label{font-weight:900;white-space:nowrap}.labeledInput input{min-width:90px;flex:1}.editorActions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}input,select,button{border:1px solid #ccc;background:#f9f9f9;border-radius:14px;padding:11px 12px;font-size:16px;font-weight:750}button{cursor:pointer;transition:transform .08s,background .12s}.keepNumberBtn.active{background:#fee2e2!important;border-color:#dc2626;color:#b91c1c}.keepNum{color:#dc2626;font-weight:900}button:active{transform:scale(.94);background:#dfe8ff!important}.out{min-height:60px;background:#f7f7f7;border:1px solid #ddd;border-radius:16px;padding:12px;font-size:18px;overflow:auto}.muted{color:#777;font-size:14px}.small{font-size:13px;color:#777;word-break:break-all}
.keyboard{position:fixed;left:0;right:0;bottom:0;background:#f7f7f7;border-top-left-radius:28px;border-top-right-radius:28px;box-shadow:0 -8px 30px #0002;transform:translateY(110%);transition:.25s;z-index:20}.keyboard.show{transform:translateY(0)}
.kTop{display:grid;grid-template-columns:repeat(6,1fr);padding:10px;gap:8px}.kTop button{border:0;background:none;font-size:28px}.pills{display:flex;gap:10px;overflow:auto;padding:0 10px 10px}.pill{min-width:120px;border-radius:999px;border:2px solid #ccc;background:white;font-size:18px;line-height:1.15;padding:10px 18px}.pill.active{background:#000;color:#fff;border-color:#000}.keys{display:grid;grid-template-columns:repeat(6,1fr)}.key{height:68px;border:1px solid #ddd;border-radius:0;background:#f8f8f8;font-size:28px;display:flex;align-items:center;justify-content:center;position:relative}.key.dark{background:#ececec}.key.small{font-size:21px}.key.tiny{font-size:16px;line-height:1.05}.dot:after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:#d10038;bottom:10px;right:12px}
.popover{position:fixed;display:none;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 16px #0002;z-index:50;overflow:hidden}
.popover.show{display:flex}
.popOpt{min-width:76px;height:68px;display:flex;align-items:center;justify-content:center;font-size:27px;border-right:1px solid #eee;background:#fff}
.popOpt:last-child{border-right:0}.popOpt.active{background:#eee}
@media(max-width:700px){.row,.row3{grid-template-columns:1fr}.editorActions{grid-template-columns:1fr 1fr}.editor{min-height:220px;font-size:30px}.key{height:66px;font-size:24px}.top{font-size:32px}}

<body>
<div class="top">Matematický editor</div>
<div class="editorWrap"><div id="editor" class="editor empty" tabindex="0" onclick="focusRoot()"></div>
  <div class="editorActions"><button onclick="solveEquation()">Spočítat</button><button id="keepNumberBtn" class="keepNumberBtn" onclick="toggleKeepNumberMode()">Zachovat číslo</button><button onclick="copyEditorLink()">Zkopírovat odkaz</button><button onclick="copyEditorLatex()">Kopírovat LaTeX</button></div>
  <div id="result" class="out" style="margin-top:10px"></div>
  <div id="editorLinkStatus" class="small"></div>
  <input id="vars" value="x,y,z" style="display:none">
  <div class="small" id="debugCalc" style="display:none"></div>
</div>

<section class="panel">
  <div class="title">Generátor podobného příkladu</div>
  <div class="muted" id="targetHint">Generátor automaticky pozná počet výsledků podle zadání v editoru.</div>
  <div id="targetBox" class="targetGrid"></div>
  <div class="coeffGrid">
    <div class="labeledInput"><label for="minCoeff">Min. |koeficient|:</label><input id="minCoeff" type="number" value="1" min="0" max="999" placeholder="Min. |koeficient|"></div>
    <div class="labeledInput"><label for="maxCoeff">Max. |koeficient|:</label><input id="maxCoeff" type="number" value="20" min="1" max="999" placeholder="Max. |koeficient|"></div>
  </div>
  <div><button onclick="generateSimilar()">Vytvořit</button></div>
  <div id="generated" class="out"><div class="muted">U soustav zadáš hodnoty x, y, z; u kvadratické rovnice kořeny x₁, x₂.</div></div>
  <button onclick="copyLatex()">Kopírovat LaTeX do Wordu</button>
  <div class="small" id="debugLatex" style="display:none"></div>
</section>

<div id="keyPopover" class="popover"></div>
<div id="keyboard" class="keyboard">
  <div class="kTop">
    <button onclick="hideKb()">⌄</button><button onclick="undo()">↶</button><button onclick="move(-1)">←</button><button onclick="move(1)">→</button><button onclick="smartEnter()">↵</button><button onclick="backspaceKey()">⌫</button>
  </div>
  <div class="pills">
    <button class="pill active" onclick="setPanel('basic',this)">+ −<br>× ÷</button>
    <button class="pill" onclick="setPanel('abc',this)">abc<br>xyz</button>
    <button class="pill" onclick="setPanel('func',this)">f(x) e<br>log ln</button>
    <button class="pill" onclick="setPanel('trig',this)">sin cos<br>tan cot</button>
    <button class="pill" onclick="setPanel('extra',this)">lim dx<br>∫ Σ ∞</button>
  </div>
  <div id="keys" class="keys"></div>
</div>

<script>
let root=[],path=[],cursor=0,history=[],panel='basic',lastGeneratedCalc='',lastGeneratedLatex='',keepNumberMode=false;
let generatorRecentBySignature={};
let generatorRecentFullBySignature={};
const panels={
basic:[
["(□)",()=>insParen(),"dot",[["(□)",()=>insParen()],["[□]",()=>insBracket("square")],["{□}",()=>insBracket("curly")],["|□|",()=>insAbs()]]],
[">",">","dot",[[">",">"],["≥",">="],["<","<"],["≤","<="]]],
["7","7","dark"],["8","8","dark"],["9","9","dark"],[":","/"],

["□/□",()=>insFrac(),"tiny dot",[
  ["□/□",()=>insFrac()],
  ["□ □/□",()=>insMixedNumber()]
]],
["√□",()=>insSqrt(),"small dot",[
  ["√□",()=>insSqrt()],
  ["³√□",()=>insRoot("3")],
  ["□√□",()=>insNRoot()]
]],
["4","4","dark"],["5","5","dark"],["6","6","dark"],["×","*"],

["□²",()=>insPow("2"),"dot",[
  ["□²",()=>insPow("2")],
  ["□³",()=>insPow("3")],
  ["□ⁿ",()=>insPow("")],
  ["□ₙ",()=>insSub("")]
]],
["x","x","dot",[
  ["x","x"],["y","y"],["z","z"]
]],
["1","1","dark"],["2","2","dark"],["3","3","dark"],["−","-"],

["π","pi","dot",[
  ["π","pi"],
  ["π/2",()=>insFracText("pi","2")],
  ["π/3",()=>insFracText("pi","3")]
]],
["📋",()=>pasteClipboard(),"dot"],["0","0","dark"],[",",".","dark"],["=","="],["+","+"]
],
abc:[
["a","a"],["b","b"],["c","c"],["d","d"],["e","e"],["f","f"],["g","g"],["h","h"],["i","i"],["j","j"],["k","k"],["l","l"],["m","m"],["n","n"],["p","p"],["q","q"],["r","r"],["s","s"],["t","t"],["u",()=>insPow(""),"dot"],["v","v"],["x","x"],["y","y"],["z","z"]
],
func:[
["sin",()=>insFunc("sin"),"small"],["cos",()=>insFunc("cos"),"small"],["tan",()=>insFunc("tan"),"small"],["log",()=>insLogBase(),"small"],["ln",()=>insFunc("ln"),"small"],["eˣ",()=>insExp(),"small"],
["x²",()=>insPow("2"),"small"],["xⁿ",()=>insPow(""),"small"],["x₁",()=>insSub("1"),"small"],["a/b",()=>insFrac(),"small"],["(","("],[")",")"],
["≤","<="],["≥",">="],["≠","!="],["⇒","=>"],["∞","Infinity"],["π","pi"],["α","alpha"],["β","beta"],["γ","gamma"],["Δ","Delta"],["φ","phi"],["ω","omega"]
],
trig:[
["sin",()=>insFunc("sin"),"small"],["cos",()=>insFunc("cos"),"small"],["tan",()=>insFunc("tan"),"small"],["cot",()=>insFunc("cot"),"small"],["30°","30"],["45°","45"],
["60°","60"],["90°","90"],["π/2",()=>insFracText("pi","2"),"small"],["π/3",()=>insFracText("pi","3"),"small"],["π/4",()=>insFracText("pi","4"),"small"],["π/6",()=>insFracText("pi","6"),"small"],
["x","x"],["y","y"],["z","z"],["+","+"],["-","-"],["=","="],["√",()=>insSqrt()],["□²",()=>insPow("2")],["/","/"],["*","*"],["1","1"],["2","2"]
],
extra:[
["lim","lim"],["∑","sum"],["∫","integral"],["dx","dx"],["∞","Infinity"],["→","->"],["{","{"],["}","}"],["[","["],["]","]"],["±","+-"],["∈","in"],
["∪","cup"],["∩","cap"],["√",()=>insSqrt()],["frac",()=>insFrac(),"small"],["x","x"],["=","="],["+","+"],["-","-"],["a","a"],["b","b"],["c","c"],["n","n"]
]
};
function arr(){let a=root;for(const p of path){if(p==='top')a=a.top;else if(p==='bottom')a=a.bottom;else if(p==='body')a=a.body;
    else if(p==='whole')a=a.whole;
    else if(p==='index')a=a.index;else if(p==='base')a=a.base;else if(p==='sup')a=a.sup;else if(p==='sub')a=a.sub;else if(p==='children')a=a.children;
    else if(p==='frac')a=a.frac;else a=a[p]}return a}
function save(){history.push(JSON.stringify({root,path,cursor}));if(history.length>100)history.shift()}
function undo(){const s=history.pop();if(!s)return;({root,path,cursor}=JSON.parse(s));render();updateDebug()}
function insNode(n){save();arr().splice(cursor,0,n);cursor++;render();updateDebug()}
function insText(t){insNode({type:'text',v:String(t)})}
function smartEnter(){ if(path.length){exitBox(); return;} insNode({type:'newline'}); }
function enter(k){path.push(cursor-1,k);cursor=0;render();updateDebug()}
function insFrac(){insNode({type:'frac',top:[],bottom:[]});enter('top')}
function insFracText(a,b){insNode({type:'frac',top:[{type:'text',v:a}],bottom:[{type:'text',v:b}]})}
function insSqrt(){insNode({type:'sqrt',body:[]});enter('body')}

function isTextNodeWithValue(n,v){return n&&n.type==='text'&&String(n.v)===v}
function isLogLikeNode(n){return n&&(n.type==='logbase'||(n.type==='func'&&(n.name==='log'||n.name==='ln')))}
function nodesAreSimpleNumericCoeff(nodes){
  if(!nodes||!nodes.length)return false;
  const txt=nodes.map(n=>(n&&n.type==='text')?String(n.v):'').join('');
  return /^[-+]?(?:\d+(?:\.\d*)?|\.\d+)$/.test(txt);
}
function splitCoeffTimesLogFromBaseNodes(baseNodes){
  if(!Array.isArray(baseNodes)||baseNodes.length!==1)return null;
  const outer=baseNodes[0];
  const body=(outer&&outer.type==='paren')?outer.body:baseNodes;
  if(!Array.isArray(body)||body.length<3)return null;
  const logNode=body[body.length-1];
  if(!isLogLikeNode(logNode))return null;
  const mul=body[body.length-2];
  if(!isTextNodeWithValue(mul,'*'))return null;
  const coeffNodes=body.slice(0,body.length-2);
  if(!nodesAreSimpleNumericCoeff(coeffNodes))return null;
  return {coeffNodes:JSON.parse(JSON.stringify(coeffNodes)),logNode:JSON.parse(JSON.stringify(logNode))};
}
function splitPowBaseNodeIfCoeffTimesLog(node){
  const split=splitCoeffTimesLogFromBaseNodes([node]);
  if(!split)return null;
  return split;
}

function insPow(v){
 save();
 const a=arr();
 if(cursor>0){
   // Mocnina musí respektovat skutečný zápis v editoru.
   // Pokud uživatel umocní závorku (např. 2·log_5(x)), umocní se celá závorka.
   // Pokud chce umocnit jen logaritmus, musí být mocnina přímo na logaritmu.
   const base=a.splice(cursor-1,1)[0];
   a.splice(cursor-1,0,{type:'sup',base:[base],sup:v?[{type:'text',v}]:[]});
   cursor=cursor;
 }else{
   a.splice(cursor,0,{type:'sup',base:[],sup:v?[{type:'text',v}]:[]});
   cursor++;
 }
 render();updateDebug();
}
function insSub(v){
 save();
 const a=arr();
 if(cursor>0){
   const base=a.splice(cursor-1,1)[0];
   a.splice(cursor-1,0,{type:'sub',base:[base],sub:v?[{type:'text',v}]:[]});
   cursor=cursor;
 }else{
   a.splice(cursor,0,{type:'sub',base:[],sub:v?[{type:'text',v}]:[]});
   cursor++;
 }
 render();updateDebug();
}
function insParen(){insNode({type:'paren',body:[]});enter('body')}
function insAbs(){insNode({type:'abs',body:[]});enter('body')}

function insBracket(kind){
  insNode({type:'bracket',kind:kind,body:[]});
  enter('body');
}
function insMixedNumber(){
  save();
  const a=arr();
  const node={
    type:'mixed',
    whole:[],
    frac:{type:'frac',top:[],bottom:[]}
  };
  a.splice(cursor,0,node);
  path.push(cursor,'whole');
  cursor=0;
  render();
  updateDebug();
}
function insRoot(indexText){
  insNode({
    type:'root',
    index:indexText?[{type:'text',v:indexText}]:[],
    body:[]
  });
  path.push(cursor-1,'body');
  cursor=0;
  render();
  updateDebug();
}
function insNRoot(){
  insNode({
    type:'root',
    index:[],
    body:[]
  });
  path.push(cursor-1,'index');
  cursor=0;
  render();
  updateDebug();
}

function insFunc(name){insNode({type:'func',name,body:[]});enter('body')}
function insLogBase(){
  save();
  const a=arr();
  const node={type:'logbase',base:[],body:[]};
  a.splice(cursor,0,node);
  path.push(cursor,'base');
  cursor=0;
  render();
  updateDebug();
}
function insExp(){insNode({type:'exp',body:[]});enter('body')}

function collectCursorStopsInArray(a, p, stops){
  // pozice před každým prvkem a za posledním prvkem
  for(let i=0;i<=a.length;i++){
    stops.push({path:p.slice(), cursor:i});

    if(i<a.length){
      const n=a[i];
      const np=p.concat(i);

      if(n.type==='frac'){
        collectCursorStopsInArray(n.top, np.concat('top'), stops);
        collectCursorStopsInArray(n.bottom, np.concat('bottom'), stops);
      }else if(n.type==='sqrt'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='bracket'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='mixed'){
        collectCursorStopsInArray(n.whole, np.concat('whole'), stops);
        collectCursorStopsInArray(n.frac.top, np.concat('frac','top'), stops);
        collectCursorStopsInArray(n.frac.bottom, np.concat('frac','bottom'), stops);
      }else if(n.type==='root'){
        collectCursorStopsInArray(n.index, np.concat('index'), stops);
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='sup'){
        collectCursorStopsInArray(n.base, np.concat('base'), stops);
        collectCursorStopsInArray(n.sup, np.concat('sup'), stops);
      }else if(n.type==='sub'){
        collectCursorStopsInArray(n.base, np.concat('base'), stops);
        collectCursorStopsInArray(n.sub, np.concat('sub'), stops);
      }else if(n.type==='paren'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='abs'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='func'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='logbase'){
        collectCursorStopsInArray(n.base, np.concat('base'), stops);
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='exp'){
        collectCursorStopsInArray(n.body, np.concat('body'), stops);
      }else if(n.type==='box'){
        collectCursorStopsInArray(n.children, np.concat('children'), stops);
      }
    }
  }
}

function allCursorStops(){
  const stops=[];
  collectCursorStopsInArray(root, [], stops);

  // odstranění duplicit, ale zachování pořadí
  const seen=new Set();
  return stops.filter(s=>{
    const k=JSON.stringify(s.path)+'|'+s.cursor;
    if(seen.has(k))return false;
    seen.add(k);
    return true;
  });
}

function smartMove(direction){
  const stops=allCursorStops();
  if(!stops.length)return;

  const key=JSON.stringify(path)+'|'+cursor;
  let idx=stops.findIndex(s=>JSON.stringify(s.path)+'|'+s.cursor===key);

  if(idx<0){
    idx=0;
  }else{
    idx+=direction;
  }

  idx=Math.max(0,Math.min(stops.length-1,idx));
  path=stops[idx].path.slice();
  cursor=stops[idx].cursor;
  render();
}

function move(d){smartMove(d)}

function exitBox(){if(!path.length)return;while(path.length&&typeof path.at(-1)!=='number')path.pop();if(path.length){cursor=path.pop()+1}else cursor=root.length;render()}
function backspaceKey(){const a=arr();if(cursor>0){save();a.splice(cursor-1,1);cursor--;render();updateDebug();return}exitBox()}

function isNumberTextNode(n){return n&&n.type==='text'&&/^[-+]?\d*(?:\.\d*)?$/.test(String(n.v))&&String(n.v)!==''&&String(n.v)!=='-'&&String(n.v)!=='+'}
function isNumberPartNode(n){return n&&n.type==='text'&&/^[0-9.]$/.test(String(n.v))}
function toggleKeepNumberMode(){
  keepNumberMode=!keepNumberMode;
  const btn=document.getElementById('keepNumberBtn');
  if(btn)btn.classList.toggle('active',keepNumberMode);
  if(!keepNumberMode)render();
}
function toggleKeepNumberAtPath(p){
  const parentPath=p.slice(0,-1);
  const idx=p[p.length-1];
  const oldPath=path.slice(),oldCursor=cursor;
  path=parentPath;cursor=0;
  const a=arr();
  path=oldPath;cursor=oldCursor;
  if(!a[idx]||!isNumberPartNode(a[idx]))return false;
  let l=idx,r=idx;
  while(l>0&&isNumberPartNode(a[l-1]))l--;
  while(r+1<a.length&&isNumberPartNode(a[r+1]))r++;
  if(l>0&&a[l-1]&&a[l-1].type==='text'&&a[l-1].v==='-'&&(l-1===0 || (a[l-2]&&a[l-2].type==='text'&&/[=+\-*/(<>{\[]/.test(a[l-2].v)))) l--;
  const shouldKeep=!a.slice(l,r+1).some(n=>n.keep);
  save();
  for(let i=l;i<=r;i++) if(a[i]&&a[i].type==='text') a[i].keep=shouldKeep;
  render();updateDebug();
  return true;
}
function markedConcat(parts){
  return parts.reduce((acc,p)=>({s:acc.s+p.s,keep:acc.keep.concat(p.keep)}),{s:'',keep:[]});
}
function markedLiteral(txt,keep=false){txt=String(txt);return {s:txt,keep:Array(txt.length).fill(!!keep)}}
function calcMarkedA(a){return markedConcat(a.map(calcMarked))}
function calcMarked(n){
 if(n.type==='newline')return markedLiteral('\n');
 if(n.type==='menuText')return markedLiteral(n.calc);
 if(n.type==='text')return markedLiteral(n.v,!!n.keep);
 if(n.type==='box')return calcMarkedA(n.children);
 if(n.type==='frac')return markedConcat([markedLiteral('(('),calcMarkedA(n.top),markedLiteral(')/('),calcMarkedA(n.bottom),markedLiteral('))')]);
 if(n.type==='bracket')return markedConcat([markedLiteral('('),calcMarkedA(n.body),markedLiteral(')')]);

function calcA(a){return a.map(calc).join('')}
function calc(n){
 if(n.type==='newline')return '\n';

 if(n.type==='paren')return '('+calcA(n.body)+')';
 if(n.type==='abs')return 'abs('+calcA(n.body)+')';

function latexA(a){return a.map(latexN).join('')}
function latexN(n){

 if(n.type==='frac')return '\\frac{'+(latexA(n.top)||'\\square')+'}{'+(latexA(n.bottom)||'\\square')+'}';
 if(n.type==='bracket')return (n.kind==='square'?'\\left[':'\\left\\{')+latexA(n.body)+(n.kind==='square'?'\\right]':'\\right\\}');

 if(n.type==='sub')return '{'+(latexA(n.base)||'\\square')+'}_{'+(latexA(n.sub)||'\\square')+'}';
 if(n.type==='abs')return '\\left| '+latexA(n.body)+' \\right|';

function readTwoArgsInParens(str,openIndex){
  if(str[openIndex]!=='(') return null;
  let depth=1, comma=-1, j=openIndex+1;
  while(j<str.length){
    const c=str[j];
    if(c==='(') depth++;
    else if(c===')'){
      depth--;
      if(depth===0) break;
    }else if(c===',' && depth===1){
      comma=j;
    }
    j++;
  }
  if(j>=str.length || comma<0) return null;
  return {a:str.slice(openIndex+1,comma), b:str.slice(comma+1,j), end:j};
}
function calcTextToNodes(s){
  s=String(s||'');
  const nodes=[];
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(ch==='\n'){nodes.push({type:'newline'});continue;}
    if(ch===' ') continue;

    // internal fraction pattern: ((top)/(bottom))
    if(s.slice(i,i+2)==='(('){
      let j=i+2, depth=1, top='';
      while(j<s.length){
        const c=s[j];
        if(c==='(') depth++;
        if(c===')') depth--;
        if(depth===0 && s[j+1]==='/' && s[j+2]==='(') break;
        top+=c; j++;
      }
      if(j<s.length && s[j+1]==='/' && s[j+2]==='('){
        j+=3; depth=1; let bot='';
        while(j<s.length){
          const c=s[j];
          if(c==='(') depth++;
          if(c===')') depth--;
          if(depth===0 && s[j+1]===')') break;
          bot+=c; j++;
        }
        if(j<s.length){
          nodes.push({type:'frac',top:calcTextToNodes(top),bottom:calcTextToNodes(bot)});
          i=j+1;
          continue;
        }
      }
    }

    if(ch==='^'){
      const base=nodes.length? [nodes.pop()] : [];
      let exp='';
      if(s[i+1]==='('){
        let j=i+2, depth=1;
        while(j<s.length){
          const c=s[j];
          if(c==='(') depth++;
          if(c===')') depth--;
          if(depth===0) break;
          exp+=c; j++;
        }
        i=j;
      }else{
        exp=s[i+1]||'';
        i++;
      }
      nodes.push({type:'sup',base,sup:calcTextToNodes(exp)});
      continue;
    }

    if(ch==='('){
      let j=i+1, depth=1, body='';
      while(j<s.length){
        const c=s[j];
        if(c==='(') depth++;
        if(c===')') depth--;
        if(depth===0) break;
        body+=c; j++;
      }
      if(j<s.length){
        nodes.push({type:'paren',body:calcTextToNodes(body)});
        i=j;
        continue;
      }
    }


    if(s.slice(i,i+4)==='abs('){
      let j=i+4, depth=1, body='';
      while(j<s.length){
        const c=s[j];
        if(c==='(') depth++;
        if(c===')') depth--;
        if(depth===0) break;
        body+=c; j++;
      }
      nodes.push({type:'abs',body:calcTextToNodes(body)});
      i=j;
      continue;
    }

    if(s.slice(i,i+5)==='sqrt('){
      let j=i+5, depth=1, body='';
      while(j<s.length){
        const c=s[j];
        if(c==='(') depth++;
        if(c===')') depth--;
        if(depth===0) break;
        body+=c; j++;
      }
      nodes.push({type:'sqrt',body:calcTextToNodes(body)});
      i=j;
      continue;
    }

    if(s.slice(i,i+8)==='logbase('){
      const parsed=readTwoArgsInParens(s,i+7);
      if(parsed){
        nodes.push({type:'logbase',base:calcTextToNodes(parsed.a),body:calcTextToNodes(parsed.b)});
        i=parsed.end;
        continue;
      }
    }

    if(/[a-zA-Z]/.test(ch)){
      let name=ch; let j=i+1;
      while(j<s.length && /[a-zA-Z]/.test(s[j])){name+=s[j];j++;}
      if(['sin','cos','tan','cot','log','ln'].includes(name) && s[j]==='('){
        let k=j+1, depth=1, body='';
        while(k<s.length){
          const c=s[k];
          if(c==='(') depth++;
          if(c===')') depth--;
          if(depth===0) break;
          body+=c;k++;
        }
        nodes.push({type:'func',name,body:calcTextToNodes(body)});
        i=k;continue;
      }
      for(const letter of name) nodes.push({type:'text',v:letter});
      i=j-1;continue;
    }

    nodes.push({type:'text',v:ch});
  }
  return nodes;
}

function denominatorsAtZero(expr,x){
  const dens=[];
  const re=/\/\(([^()]+)\)/g;
  let m;
  while((m=re.exec(expr))!==null){
    try{dens.push(evalJS(m[1],x))}catch(e){}
  }
  return dens.some(v=>!Number.isFinite(v)||Math.abs(v)<1e-9);
}

function isValidRootForEquation(l,r,x){
  if(denominatorsAtZero(l,x)||denominatorsAtZero(r,x)) return false;
  let lv,rv;
  try{lv=evalJS(l,x);rv=evalJS(r,x)}catch(e){return false}
  return Number.isFinite(lv)&&Number.isFinite(rv)&&Math.abs(lv-rv)<1e-7;
}

function normalizeExpr(s){
  s=String(s||'');
  s=s.replace(/−/g,'-').replace(/[·⋅×]/g,'*');
  s=s.replace(/[\[{]/g,'(').replace(/[\]}]/g,')');
  s=s.replace(/(\d)([a-zA-Z])/g,'$1*$2')
     .replace(/([a-zA-Z])(\d)/g,'$1*$2')
     .replace(/(\d)\(/g,'$1*(')
     .replace(/(^|[^a-zA-Z])([a-zA-Z])\(/g,'$1$2*(')
     .replace(/\)([a-zA-Z0-9])/g,')*$1')
     .replace(/\)\(/g,')*(');
  return s;
}

function getEquationLinesFromCalc(){
  return calcA(root)
    .split(/\n|;/)
    .map(s=>s.trim())
    .filter(s=>s.includes('='));
}

function parseLinearEquationCoeffs(eq, vars){
  const idx=eq.indexOf('=');
  const left=eq.slice(0,idx);
  const right=eq.slice(idx+1);

  // Linear coefficients by evaluating f = left - right at 0 and unit vectors.
  function valueAt(values){
    let expr=normalizeExpr('('+left+')-('+right+')');
    vars.forEach((v,i)=>{
      const re=new RegExp('\\b'+v+'\\b','g');
      expr=expr.replace(re,'('+values[i]+')');
    });
    return Function('return ('+expr+')')();
  }

  const zero=Array(vars.length).fill(0);
  const c=valueAt(zero);
  const coeffs=[];
  for(let i=0;i<vars.length;i++){
    const e=Array(vars.length).fill(0);
    e[i]=1;
    coeffs.push(valueAt(e)-c);
  }
  // equation is coeffs·vars + c = 0 => coeffs·vars = -c
  return {coeffs, rhs:-c};
}

function solveLinearSystemFallback(eqs, vars){
  const n=eqs.length;
  const A=[];
  const b=[];
  for(let i=0;i<n;i++){
    const row=parseLinearEquationCoeffs(eqs[i], vars);
    A.push(row.coeffs);
    b.push(row.rhs);
  }

  // Gaussian elimination
  const M=A.map((row,i)=>row.concat([b[i]]));
  for(let col=0; col<n; col++){
    let pivot=col;
    for(let r=col+1;r<n;r++){
      if(Math.abs(M[r][col])>Math.abs(M[pivot][col])) pivot=r;
    }
    if(Math.abs(M[pivot][col])<1e-12) throw Error('singular');
    [M[col],M[pivot]]=[M[pivot],M[col]];

    const div=M[col][col];
    for(let j=col;j<=n;j++) M[col][j]/=div;

    for(let r=0;r<n;r++){
      if(r===col) continue;
      const factor=M[r][col];
      for(let j=col;j<=n;j++) M[r][j]-=factor*M[col][j];
    }
  }

  return M.map(row=>row[n]);
}


function isEquationLinearInVars(eq, vars){
  // Ověří linearitu numericky: lineární rovnice musí sedět nejen v bodech 0 a jednotkových
  // vektorech, ale i v několika kombinacích hodnot. Tím se kvadratická soustava omylem
  // nepošle do lineárního Gaussova řešení.
  let row;
  try{ row=parseLinearEquationCoeffs(eq, vars); }catch(e){ return false; }
  const tests=[];
  if(vars.length===2){
    [-2,-1,0,1,2].forEach(x=>[-2,-1,0,1,2].forEach(y=>tests.push([x,y])));
  }else{
    tests.push(Array(vars.length).fill(0));
    for(let i=0;i<vars.length;i++){
      const a=Array(vars.length).fill(0); a[i]=2; tests.push(a);
      const b=Array(vars.length).fill(1); b[i]=-1; tests.push(b);
    }
    tests.push(Array(vars.length).fill(2),Array(vars.length).fill(-1));
  }
  for(const values of tests){
    let actual;
    try{ actual=equationLineValueAt(eq, vars, values); }catch(e){ return false; }
    const predicted=row.coeffs.reduce((s,c,i)=>s+c*values[i],0)-row.rhs;
    if(!Number.isFinite(actual) || Math.abs(actual-predicted)>1e-7)return false;
  }
  return true;
}

function uniqueSystemSolutions(solutions){
  const out=[];
  (solutions||[]).forEach(sol=>{
    if(!Array.isArray(sol) || !sol.every(Number.isFinite))return;
    if(!out.some(o=>o.length===sol.length && o.every((v,i)=>Math.abs(v-sol[i])<1e-7)))out.push(sol);
  });
  return out.sort((a,b)=>{
    for(let i=0;i<Math.min(a.length,b.length);i++){
      if(Math.abs(a[i]-b[i])>1e-7)return a[i]-b[i];
    }
    return a.length-b.length;
  });
}

function systemSolutionIsValid(eqs, vars, values){
  try{
    return eqs.every(eq=>Math.abs(equationLineValueAt(eq,vars,values))<1e-7);
  }catch(e){ return false; }
}

function solveLinearQuadratic2System(eqs, vars){
  if(eqs.length!==2 || vars.length!==2)return null;
  const linearIndexes=[];
  for(let i=0;i<2;i++) if(isEquationLinearInVars(eqs[i],vars)) linearIndexes.push(i);
  if(linearIndexes.length!==1)return null;

  const li=linearIndexes[0], qi=1-li;
  const row=parseLinearEquationCoeffs(eqs[li],vars);
  const a=row.coeffs[0], b=row.coeffs[1], rhs=row.rhs;
  if(Math.abs(a)<1e-12 && Math.abs(b)<1e-12)return null;

  const solutions=[];
  const solveByFreeVariable=(freeIndex)=>{
    const depIndex=1-freeIndex;
    const depCoeff=row.coeffs[depIndex];
    if(Math.abs(depCoeff)<1e-12)return;
    const freeCoeff=row.coeffs[freeIndex];
    const valuesFromFree=t=>{
      const vals=[0,0];
      vals[freeIndex]=t;
      vals[depIndex]=(rhs-freeCoeff*t)/depCoeff;
      return vals;
    };
    const g=t=>equationLineValueAt(eqs[qi],vars,valuesFromFree(t));
    let c,y1,y2;
    try{ c=g(0); y1=g(1); y2=g(2); }catch(e){ return; }
    if(![c,y1,y2].every(Number.isFinite))return;
    const A=(y2-2*y1+c)/2;
    const B=y1-c-A;
    const roots=[];
    if(Math.abs(A)<1e-10){
      if(Math.abs(B)>1e-10)roots.push(-c/B);
    }else{
      const D=B*B-4*A*c;
      if(D>=-1e-9){
        if(Math.abs(D)<1e-9)roots.push(-B/(2*A));
        else{
          const s=Math.sqrt(D);
          roots.push((-B-s)/(2*A),(-B+s)/(2*A));
        }
      }
    }
    roots.forEach(t=>{
      const vals=valuesFromFree(t);
      if(systemSolutionIsValid(eqs,vars,vals))solutions.push(vals);
    });
  };

  // Vyzkoušíme obě vyjádření; druhé je pojistka pro svislou/vodorovnou přímku.
  solveByFreeVariable(0);
  solveByFreeVariable(1);
  return uniqueSystemSolutions(solutions);
}

function solveNonlinearSystemNumeric(eqs, vars){
  const n=eqs.length;
  if(n<2 || n>3)return null;
  const solutions=[];

  function residual(values){
    return eqs.map(eq=>equationLineValueAt(eq,vars,values));
  }

  // Bezpečný hrubý fallback: najde všechna celá řešení v rozsahu -10..10, ne jen první.
  const range=[];
  for(let i=-10;i<=10;i++)range.push(i);

  if(n===2){
    for(const x of range){
      for(const y of range){
        const vals=[x,y];
        const res=residual(vals);
        if(res.every(v=>Math.abs(v)<1e-8))solutions.push(vals);
      }
    }
  }

  if(n===3){
    for(const x of range){
      for(const y of range){
        for(const z of range){
          const vals=[x,y,z];
          const res=residual(vals);
          if(res.every(v=>Math.abs(v)<1e-8))solutions.push(vals);
        }
      }
    }
  }

  const out=uniqueSystemSolutions(solutions);
  return out.length?out:null;
}

function solveSystemAll(eqs, vars){
  if(!eqs || eqs.length<2)return null;
  const usedVars=vars.slice(0,eqs.length);

  // 1) Lineární soustavy řešíme lineárně, ale jen když jsou všechny řádky opravdu lineární.
  if(eqs.every(eq=>isEquationLinearInVars(eq,usedVars))){
    try{
      const values=solveLinearSystemFallback(eqs,usedVars);
      if(systemSolutionIsValid(eqs,usedVars,values))return [values];
    }catch(e){}
  }

  // 2) Typický školní případ: jedna lineární a jedna kvadratická rovnice o dvou neznámých.
  try{
    const lq=solveLinearQuadratic2System(eqs,usedVars);
    if(lq && lq.length)return lq;
  }catch(e){}

  // 3) Nerdamer může vrátit symbolické řešení; bereme ho jen po kontrole dosazením.
  try{
    if(window.nerdamer){
      const used=eqs.slice(0,3).map(eq=>{
        const idx=eq.indexOf('=');
        const l=eq.slice(0,idx), r=eq.slice(idx+1);
        return normalizeExpr('('+l+')-('+r+')');
      });
      const res=nerdamer.solveEquations(used,usedVars);
      const sols=[];
      if(Array.isArray(res) && res.length){
        // Nerdamer často vrací jedno řešení jako [[x,val],[y,val]].
        if(res.every(item=>Array.isArray(item) && item.length>=2 && typeof item[0]==='string')){
          const vals=usedVars.map(v=>{
            const item=res.find(x=>x[0]===v);
            return item?numericValueFromNerdamer(String(item[1])):NaN;
          });
          if(systemSolutionIsValid(eqs,usedVars,vals))sols.push(vals);
        }else{
          res.forEach(sol=>{
            if(Array.isArray(sol)){
              const vals=usedVars.map(v=>{
                const item=sol.find && sol.find(x=>Array.isArray(x)&&x[0]===v);
                return item?numericValueFromNerdamer(String(item[1])):NaN;
              });
              if(systemSolutionIsValid(eqs,usedVars,vals))sols.push(vals);
            }
          });
        }
      }
      const out=uniqueSystemSolutions(sols);
      if(out.length)return out;
    }
  }catch(e){}

  // 4) Poslední pojistka: celočíselná řešení v rozumném rozsahu.
  return solveNonlinearSystemNumeric(eqs,usedVars);
}

function systemSolutionsToLatex(vars, solutions){
  solutions=uniqueSystemSolutions(solutions);
  if(!solutions.length)return '';

  // Výsledky soustav zapisujeme jako dvojice/trojice:
  // [x_1; y_1]=[1; 2] \quad [x_2; y_2]=[-3; 5]
  return solutions.map((sol,si)=>{
    const k=si+1;
    const left='\\left['+vars.map(v=>`${v}_{${k}}`).join(';\\;')+'\\right]';
    const right='\\left['+sol.map(v=>fmtLatexNumber(v)).join(';\\;')+'\\right]';
    return left+'='+right;
  }).join('\\quad ');
}

async function renderSystemResult(box, vars, values){

  box.innerHTML='\\['+systemSolutionsToLatex(vars,solutions)+'\\]';
  if(window.MathJax) await MathJax.typesetPromise([box]);
}



function dedupeRoots(roots){
 const out=[];
 roots.forEach(r=>{
  if(Number.isFinite(r) && !out.some(x=>Math.abs(x-r)<1e-6)) out.push(r);
 });
 return out.sort((a,b)=>a-b);
}

function fmtLatexNumber(n){
 const r=Math.round(n*1e9)/1e9;
 if(Math.abs(r-Math.round(r))<1e-9) return String(Math.round(r));
 return String(r).replace(".",",");
}

function formatRootList(variable, roots){
 roots=dedupeRoots(roots);
 if(!roots.length) return null;
 if(roots.length===1) return `\\[${variable}=${fmtLatexNumber(roots[0])}\\]`;
 return "\\[" + roots.map((r,i)=>`${variable}_{${i+1}}=${fmtLatexNumber(r)}`).join("\\quad ") + "\\]";
}


function rationalApproxSmall(x,maxDen=12,tol=1e-8){
  if(!Number.isFinite(x)) return null;
  const sign=x<0?-1:1;
  x=Math.abs(x);
  let best=null,bestErr=Infinity;
  for(let q=1;q<=maxDen;q++){
    const p=Math.round(x*q);
    const err=Math.abs(x-p/q);
    if(err<bestErr){bestErr=err;best=[sign*p,q];}
  }
  if(!best || bestErr>tol) return null;
  if(best[0]===0) return [0,1];
  const g=gcdInt(Math.abs(best[0]),best[1]);
  return [best[0]/g,best[1]/g];
}
function gcdInt(a,b){while(b){const t=a%b;a=b;b=t;}return a||1;}
function latexRationalExponent(n){
  const r=rationalApproxSmall(n,24,1e-7);
  if(!r) return fmtLatexNumber(n);
  const p=r[0], q=r[1];
  if(q===1) return String(p);
  if(p<0) return '-\\frac{'+Math.abs(p)+'}{'+q+'}';
  return '\\frac{'+p+'}{'+q+'}';
}
function logPowerLatex(baseText,u){
  const exp=latexRationalExponent(u);
  const base=calcToLatexSimple(String(baseText||'').trim());
  if(exp==='0') return '1';
  if(exp==='1') return base;
  return base+'^{'+exp+'}';
}
function evalExprAtX(expr,x,variable='x'){
  let e=normalizeExpr(expr);
  const re=new RegExp('\\b'+variable+'\\b','g');
  e=e.replace(re,'('+x+')');
  return evalJS(e,x);
}
function linearCoeffOfArg(expr,variable='x'){
  let y0,y1,y2;
  try{y0=evalExprAtX(expr,0,variable);y1=evalExprAtX(expr,1,variable);y2=evalExprAtX(expr,2,variable);}catch(e){return null;}
  if(![y0,y1,y2].every(Number.isFinite)) return null;
  const a=y1-y0, b=y0;
  if(Math.abs((y2-y1)-a)>1e-7) return null;
  if(Math.abs(a)<1e-12) return null;
  return {a,b};
}
function symbolicXFromLinearArg(argText,powLatex,variable='x'){
  const lin=linearCoeffOfArg(argText,variable);
  if(!lin) return null;
  let a=lin.a, b=lin.b;
  const ar=rationalApproxSmall(a,12,1e-8);
  const br=rationalApproxSmall(b,12,1e-8);
  if(!ar || !br) return null;
  a=ar[0]/ar[1]; b=br[0]/br[1];
  if(Math.abs(a-1)<1e-9 && Math.abs(b)<1e-9) return powLatex;
  if(Math.abs(b)<1e-9){
    if(Math.abs(a-1)<1e-9) return powLatex;
    if(Math.abs(a+1)<1e-9) return '-'+powLatex;
    return '\\frac{'+powLatex+'}{'+fmtLatexNumber(a)+'}';
  }
  const bLatex=fmtLatexNumber(Math.abs(b));
  const inside = b>0 ? powLatex+'-'+bLatex : powLatex+'+'+bLatex;
  if(Math.abs(a-1)<1e-9) return inside;
  return '\\frac{'+inside+'}{'+fmtLatexNumber(a)+'}';
}
function logSymbolicRootLatex(left,right,x,variable='x'){
  try{
    const equation='('+left+')-('+right+')';
    const ranges=logbaseCallRanges(equation);
    if(!ranges.length) return null;
    const first=ranges[0];
    const baseText=equation.slice(first.baseStart,first.baseEnd).trim();
    const argText=equation.slice(first.argStart,first.argEnd).trim();
    if(!ranges.every(r=>almostSameLogCall(equation,r,baseText,argText))) return null;
    const baseValue=evalJS(baseText,x);
    const argValue=evalJS(argText,x);
    if(!Number.isFinite(baseValue)||baseValue<=0||Math.abs(baseValue-1)<1e-12) return null;
    if(!Number.isFinite(argValue)||argValue<=0) return null;
    const u=Math.log(argValue)/Math.log(baseValue);
    const ru=rationalApproxSmall(u,24,1e-7);
    if(!ru) return null;
    const pow=logPowerLatex(baseText,ru[0]/ru[1]);
    return symbolicXFromLinearArg(argText,pow,variable) || pow;
  }catch(e){return null;}
}
function formatRootListForLogEquation(left,right,variable,roots){
  roots=dedupeRoots(roots);
  if(!roots.length) return null;
  const parts=roots.map((r,i)=>{
    const pretty=logSymbolicRootLatex(left,right,r,variable) || fmtLatexNumber(r);
    return roots.length===1 ? `${variable}=${pretty}` : `${variable}_{${i+1}}=${pretty}`;
  });
  return '\\['+parts.join('\\quad ')+'\\]';
}
function inlineRootsForLogEquation(left,right,variable,roots){
  roots=dedupeRoots(roots);
  return roots.map((r,i)=>{
    const pretty=logSymbolicRootLatex(left,right,r,variable) || fmtLatexNumber(r);
    return (roots.length===1 ? `${variable} = ${pretty}` : `${variable}_{${i+1}} = ${pretty}`);
  }).join('\\quad ');
}

function splitTopLevelEquation(raw){
 const eqs=String(raw).split(/\n|;/).filter(x=>x.includes("="));
 if(eqs.length!==1) return null;
 const idx=eqs[0].indexOf("=");
 return [eqs[0].slice(0,idx), eqs[0].slice(idx+1)];
}

function safeEval(expr,x){
 const y=evalJS(expr,x);
 return Number.isFinite(y) ? y : NaN;
}

function isValidEquationRoot(left,right,x){
 let lv=safeEval(left,x), rv=safeEval(right,x);
 if(!Number.isFinite(lv)||!Number.isFinite(rv)) return false;
 if(Math.abs(lv)>1e12 || Math.abs(rv)>1e12) return false;
 return Math.abs(lv-rv)<1e-7;
}

const NUMERIC_ROOTS_MAX_RESULTS=20;
const NUMERIC_ROOTS_SCAN_MIN=-1000;
const NUMERIC_ROOTS_SCAN_MAX=1000;
const NUMERIC_ROOTS_SCAN_STEP=0.5;
const GENERATOR_MAX_TOKENS=45;

function findNumericRoots(left,right){
 const f=x=>safeEval(left,x)-safeEval(right,x);
 const roots=[];
 const min=NUMERIC_ROOTS_SCAN_MIN, max=NUMERIC_ROOTS_SCAN_MAX, step=NUMERIC_ROOTS_SCAN_STEP;
 let px=null, pv=null;

 for(let x=min; x<=max+1e-12; x+=step){
  let y=f(x);

  if(!Number.isFinite(y)){
    px=null; pv=null; 
    continue;
  }

  if(Math.abs(y)<1e-8 && isValidEquationRoot(left,right,x)){
    roots.push(x);
    if(roots.length>=NUMERIC_ROOTS_MAX_RESULTS) break;
  }

  if(px!==null && Number.isFinite(pv) && pv*y<0){
    let a=px,b=x,fa=pv;
    for(let i=0;i<80;i++){
      const m=(a+b)/2;
      const fm=f(m);
      if(!Number.isFinite(fm)) break;
      if(Math.abs(fm)<1e-12){a=b=m;break}
      if(fa*fm<=0){b=m}else{a=m;fa=fm}
    }
    const rr=(a+b)/2;
    if(isValidEquationRoot(left,right,rr)){
      roots.push(rr);
      if(roots.length>=NUMERIC_ROOTS_MAX_RESULTS) break;
    }
  }

  px=x; pv=y;
 }

 // exact-ish integer checks
 for(let x=-50;x<=50;x++){
  if(isValidEquationRoot(left,right,x)){
    roots.push(x);
    if(roots.length>=NUMERIC_ROOTS_MAX_RESULTS) break;
  }
 }

 // malé kladné hodnoty pro logaritmické rovnice typu log_10(x)=-1
 const extraChecks=[];
 for(let p=-6;p<=3;p++){
  const base=Math.pow(10,p);
  extraChecks.push(base,2*base,5*base);
 }
 for(const x of extraChecks){
  if(roots.length>=NUMERIC_ROOTS_MAX_RESULTS) break;
  if(isValidEquationRoot(left,right,x)) roots.push(x);
 }

 return dedupeRoots(roots);
}

function parseNerdamerSolutions(res){
 let txt=String(res && res.toString ? res.toString() : res);
 txt=txt.trim();
 if(!txt) return [];
 if(txt.startsWith("[") && txt.endsWith("]")) txt=txt.slice(1,-1);
 if(!txt.trim()) return [];
 return txt.split(",").map(s=>s.trim()).filter(Boolean);
}

function numericValueFromNerdamer(s){
 try{
   const t=nerdamer(s).evaluate().text();
   const n=Number(t);
   return Number.isFinite(n) ? n : NaN;
 }catch(e){
   return NaN;
 }
}

function solveQuadraticBySampling(left,right){
 // For fallback: sample f(0), f(1), f(2) and infer ax^2+bx+c if possible.
 const f=x=>safeEval(left,x)-safeEval(right,x);
 const c=f(0), y1=f(1), y2=f(2);
 if(!Number.isFinite(c)||!Number.isFinite(y1)||!Number.isFinite(y2)) return [];
 const a=(y2-2*y1+c)/2;
 const b=y1-c-a;
 if(Math.abs(a)<1e-12) return [];
 const D=b*b-4*a*c;
 if(D<-1e-9) return [];
 if(Math.abs(D)<1e-9) return [-b/(2*a)].filter(x=>isValidEquationRoot(left,right,x));
 const s=Math.sqrt(D);
 return [(-b-s)/(2*a),(-b+s)/(2*a)].filter(x=>isValidEquationRoot(left,right,x));
}


function findIntegerRootsExact(left,right,min=-100,max=100){
  const roots=[];
  for(let x=min;x<=max;x++){
    try{
      if(isValidEquationRoot(left,right,x)) roots.push(x);
    }catch(e){}
  }
  return dedupeRoots(roots);
}

function mergeRootArrays(){
  let all=[];
  for(const arr of arguments){
    if(Array.isArray(arr)) all=all.concat(arr);
  }
  return dedupeRoots(all.filter(n=>Number.isFinite(n) && Math.abs(n)<1e9));
}


function solveAllNumericRootsRobust(left,right,variable='x'){
  const roots=[];
  function add(x){
    if(roots.length>=NUMERIC_ROOTS_MAX_RESULTS) return;
    if(Number.isFinite(x) && Math.abs(x)<1e9 && isValidEquationRoot(left,right,x)) roots.push(x);
  }

  // 1) nejspolehlivější pro školní příklady: celé kořeny přes přímé dosazení
  for(let x=-50;x<=50 && roots.length<NUMERIC_ROOTS_MAX_RESULTS;x++) add(x);

  // 2) u kvadratických rovnic najdi i zlomkové dvojné kořeny.
  // Samotné skenování podle změny znaménka je může minout (např. x = 1/2).
  try{
    const quad=solveQuadraticBySampling(left,right);
    quad.forEach(add);
  }catch(e){}

  // 3) jemnější numerické hledání změny znaménka
  try{
    const more=findNumericRoots(left,right);
    more.forEach(add);

function normalizeInequalitySymbols(s){

function splitMathLines(raw){

}
function parseInequalityLine(line){

  const ops=['<=','>=','<','>'];
  for(const op of ops){
    const idx=line.indexOf(op);

      return {left:line.slice(0,idx), op, right:line.slice(idx+op.length)};
    }
  }
  return null;
}

function inequalityHolds(val,op){
  const eps=1e-8;
  if(!Number.isFinite(val)) return false;
  if(op==='<') return val < -eps;
  if(op==='<=') return val <= eps;
  if(op==='>') return val > eps;
  if(op==='>=') return val >= -eps;
  return false;
}
function extractDenominators(expr){
  expr=String(expr||'');
  const dens=[];
  for(let i=0;i<expr.length;i++){
    if(expr[i]==='/' && expr[i+1]==='('){
      let j=i+2, depth=1, den='';
      while(j<expr.length){
        const c=expr[j];
        if(c==='(') depth++;
        if(c===')') depth--;
        if(depth===0) break;
        den+=c; j++;
      }
      if(den.trim()) dens.push(den.trim());
      i=j;
    }
  }

}

  try{ solveQuadraticBySampling(left,right).forEach(x=>addUniqueNumber(pts,x)); }catch(e){}
  try{ denomZerosForExpression(left,variable).forEach(x=>addUniqueNumber(pts,x)); }catch(e){}
  try{ denomZerosForExpression(right,variable).forEach(x=>addUniqueNumber(pts,x)); }catch(e){}

function solveOneInequalityIntervals(line,variable='x'){

  const probes=[];
  if(!pts.length){
    probes.push({a:-Infinity,b:Infinity,test:0});
  }else{
    probes.push({a:-Infinity,b:pts[0],test:pts[0]-1});
    for(let i=0;i<pts.length-1;i++) probes.push({a:pts[i],b:pts[i+1],test:(pts[i]+pts[i+1])/2});
    probes.push({a:pts[pts.length-1],b:Infinity,test:pts[pts.length-1]+1});
  }
  probes.forEach(seg=>{
    let ok=false;
    try{ ok=inequalityHolds(evalIneqValue(left,right,seg.test),op); }catch(e){ok=false;}
    if(ok) intervals.push({a:seg.a,b:seg.b,leftClosed:false,rightClosed:false});

    try{ ok=inequalityHolds(evalIneqValue(left,right,x),op); }catch(e){ok=false;}

function mergeIntervals(items){
  if(!items.length) return [];
  items=items.map(it=>({a:cleanEndpoint(it.a),b:cleanEndpoint(it.b),leftClosed:!!it.leftClosed,rightClosed:!!it.rightClosed}))
    .sort((u,v)=>u.a-v.a || u.b-v.b);
  const out=[];
  for(const it of items){
    if(it.a>it.b) continue;
    const last=out[out.length-1];
    if(!last){ out.push(it); continue; }
    const touches=Math.abs(last.b-it.a)<1e-8;
    const overlaps=last.b>it.a+1e-8;
    const canJoin=overlaps || (touches && (last.rightClosed || it.leftClosed));

        last.b=it.b; last.rightClosed=it.rightClosed;
      }else if(Math.abs(it.b-last.b)<1e-8){

    else lc=(Math.abs(start-a.a)<1e-8)?a.leftClosed:b.leftClosed;
    if(Math.abs(end-a.b)<1e-8 && Math.abs(end-b.b)<1e-8) rc=a.rightClosed&&b.rightClosed;
    else rc=(Math.abs(end-a.b)<1e-8)?a.rightClosed:b.rightClosed;
    if(start<end-1e-8 || (Math.abs(start-end)<1e-8 && lc && rc)) out.push({a:start,b:end,leftClosed:lc,rightClosed:rc});

function solveInequalitySystem(raw,variable='x'){
  const lines=splitMathLines(raw).filter(l=>parseInequalityLine(l));

  let current=[{a:-Infinity,b:Infinity,leftClosed:false,rightClosed:false}];
  for(const line of lines){
    const one=solveOneInequalityIntervals(line,variable);
    if(!one) return null;
    current=intersectTwoIntervalSets(current,one);

  }

function intervalsToLatex(intervals,variable='x'){

  const parts=intervals.map(it=>{
    const l=(it.a===-Infinity)?'(': (it.leftClosed?'\\langle':'(');
    const r=(it.b===Infinity)?')': (it.rightClosed?'\\rangle':')');
    if(Math.abs(it.a-it.b)<1e-8 && it.leftClosed && it.rightClosed){
      return `\\langle ${fmtIntervalNumber(it.a)}; ${fmtIntervalNumber(it.b)} \\rangle`;
    }

function hasAbsExpr(s){return /\babs\(/.test(String(s||''));}
function readFunctionArgumentAt(str,openIndex){
  if(str[openIndex]!=='(') return null;
  let depth=1, j=openIndex+1, body='';
  while(j<str.length){
    const c=str[j];
    if(c==='(') depth++;
    else if(c===')'){
      depth--;
      if(depth===0) return {body,end:j};
    }
    body+=c; j++;
  }
  return null;
}
function extractAbsArguments(expr){
  expr=String(expr||'');
  const out=[];
  for(let i=0;i<expr.length;i++){
    if(expr.slice(i,i+4)==='abs('){
      const parsed=readFunctionArgumentAt(expr,i+3);
      if(parsed){out.push(parsed.body); i=parsed.end;}
    }
  }
  return out;
}
function replaceAbsBySign(expr,testX){
  expr=String(expr||'');
  let out='';
  for(let i=0;i<expr.length;i++){
    if(expr.slice(i,i+4)==='abs('){
      const parsed=readFunctionArgumentAt(expr,i+3);
      if(parsed){
        const inner=replaceAbsBySign(parsed.body,testX);
        let val=NaN;
        try{val=evalJS(inner,testX);}catch(e){}
        const sign=val>=0?1:-1;
        out+=(sign>=0?'(':'(-(')+inner+(sign>=0?')':'))');
        i=parsed.end;
        continue;
      }
    }
    out+=expr[i];
  }
  return out;
}
function midpointForSegment(a,b){
  if(a===-Infinity && b===Infinity) return 0;
  if(a===-Infinity) return b-1;
  if(b===Infinity) return a+1;
  return (a+b)/2;
}
function absCriticalPointsForExpr(expr,variable='x'){

  function add(x){if(Number.isFinite(x)&&!pts.some(y=>Math.abs(y-x)<1e-7))pts.push(cleanEndpoint(x));}
  extractAbsArguments(expr).forEach(arg=>{
    try{solveAllNumericRootsRobust(arg,'0',variable).forEach(add);}catch(e){}
    try{findNumericRoots(arg,'0').forEach(add);}catch(e){}
  });
  try{denomZerosForExpression(expr,variable).forEach(add);}catch(e){}
  return pts.sort((a,b)=>a-b);
}
function equationCandidateCriticalPoints(left,right,variable='x'){
  const pts=[];
  function add(x){if(Number.isFinite(x)&&!pts.some(y=>Math.abs(y-x)<1e-7))pts.push(cleanEndpoint(x));}
  absCriticalPointsForExpr(left,variable).forEach(add);
  absCriticalPointsForExpr(right,variable).forEach(add);
  try{denomZerosForExpression(left,variable).forEach(add);}catch(e){}
  try{denomZerosForExpression(right,variable).forEach(add);}catch(e){}

function expressionIdentityOnSegment(left,right,a,b){
  const tests=[];
  const m=midpointForSegment(a,b);
  tests.push(m);
  if(a!==-Infinity && b!==Infinity){tests.push(a+(b-a)/3,a+2*(b-a)/3);}
  else {tests.push(m-0.37,m+0.61);}
  for(const x of tests){
    if(isForbiddenPoint(left,right,x)) return false;
    if(!isValidEquationRoot(left,right,x)) return false;

function solveAbsEquationSet(left,right,variable='x'){
  const pts=equationCandidateCriticalPoints(left,right,variable);
  const roots=[];

  function inOpenSegment(x,a,b){return x>a+1e-8 && x<b-1e-8;}
  function addRoot(x){if(isValidEquationRoot(left,right,x)&&!roots.some(r=>Math.abs(r-x)<1e-7))roots.push(cleanEndpoint(x));}
  for(let i=0;i<bounds.length-1;i++){
    const a=bounds[i], b=bounds[i+1];
    if(!(a<b)) continue;
    const test=midpointForSegment(a,b);
    const sl=replaceAbsBySign(left,test);
    const sr=replaceAbsBySign(right,test);
    if(expressionIdentityOnSegment(sl,sr,a,b)){

function replaceRangesWithToken(str,ranges,token){
  let out=String(str||'');
  ranges.slice().sort((a,b)=>b.start-a.start).forEach(r=>{
    out=out.slice(0,r.start)+token+out.slice(r.end);
  });
  return out;
}
function almostSameLogCall(raw,r,firstBase,firstArg){
  return raw.slice(r.baseStart,r.baseEnd).trim()===firstBase && raw.slice(r.argStart,r.argEnd).trim()===firstArg;
}
function solveSingleLogQuadraticBySubstitution(left,right,variable='x'){
  // Speciální bezpečná větev pro školní typ:
  // a*(log_b(f(x)))^2 + c*log_b(f(x)) + d = 0.
  // Nezasahuje do ostatních rovnic: spustí se jen při jednom stejném logbase(...) výrazu
  // a po nalezení každého kořene ho ještě ověří dosazením do původní rovnice.
  const equation='('+left+')-('+right+')';
  const ranges=logbaseCallRanges(equation);
  if(!ranges.length) return [];

  const first=ranges[0];
  const baseText=equation.slice(first.baseStart,first.baseEnd).trim();
  const argText=equation.slice(first.argStart,first.argEnd).trim();
  if(!ranges.every(r=>almostSameLogCall(equation,r,baseText,argText))) return [];

  let baseValue=NaN;
  try{ baseValue=evalJS(baseText,1); }catch(e){}
  if(!Number.isFinite(baseValue)||baseValue<=0||Math.abs(baseValue-1)<1e-12) return [];

  const uExpr=replaceRangesWithToken(equation,ranges,'u');
  // Pokud po nahrazení logaritmu pořád zůstává x mimo argument logaritmu,
  // už to není čistá substituce jednou proměnnou u.
  const withoutWords=uExpr.replace(/logbase|Math|sqrt|abs|sin|cos|tan|ln|log/g,'');
  if(new RegExp('\\b'+variable+'\\b').test(withoutWords)) return [];

  function evalU(u){
    let e=normalizeExpr(uExpr)
      .replace(/\^/g,'**')
      .replace(/\bpi\b/g,'Math.PI')
      .replace(/\babs\(/g,'Math.abs(')
      .replace(/\bsqrt\(/g,'Math.sqrt(')
      .replace(/\bsin\(/g,'Math.sin(')
      .replace(/\bcos\(/g,'Math.cos(')
      .replace(/\btan\(/g,'Math.tan(')
      .replace(/\blog\(/g,'Math.log(')
      .replace(/\bln\(/g,'Math.log(');
    return Function('u','return ('+e+')')(u);
  }

  let y0,y1,y2;
  try{ y0=evalU(0); y1=evalU(1); y2=evalU(2); }catch(e){ return []; }
  if(![y0,y1,y2].every(Number.isFinite)) return [];

  const A=(y2-2*y1+y0)/2;
  const B=y1-y0-A;
  const C=y0;
  const uRoots=[];
  if(Math.abs(A)<1e-10){
    if(Math.abs(B)>1e-10) uRoots.push(-C/B);
  }else{
    const D=B*B-4*A*C;
    if(D>=-1e-9){
      if(Math.abs(D)<1e-9) uRoots.push(-B/(2*A));
      else{
        const s=Math.sqrt(D);
        uRoots.push((-B-s)/(2*A),(-B+s)/(2*A));
      }
    }
  }

  const xRoots=[];
  uRoots.forEach(u=>{
    if(!Number.isFinite(u)) return;
    const targetArg=Math.pow(baseValue,u);
    if(!Number.isFinite(targetArg)||targetArg<=0) return;
    let roots=[];
    try{ roots=solveAllNumericRootsRobust(argText,String(targetArg),variable); }catch(e){ roots=[]; }
    roots.forEach(x=>{
      if(isValidEquationRoot(left,right,x)) xRoots.push(x);
    });
  });
  return dedupeRoots(xRoots);
}

    if(allNumericRoots.length>=symbolicRoots.length){
      html=formatRootList(v,allNumericRoots);
    }else if(symbolicRoots.length===1){
      html='\\['+v+'='+nerdamer(symbolicRoots[0]).toTeX()+'\\]';
    }else{
      html='\\['+symbolicRoots.map((s,i)=>`${v}_{${i+1}}=${nerdamer(s).toTeX()}`).join('\\quad ')+'\\]';
    }

    if(degree>2){
      const fact=factorLatexOfEquation(left,right,v);
      if(fact) html+='<div class="muted">Součinový tvar: \\('+fact+'=0\\)</div>';
    }
    box.innerHTML=html;
    if(window.MathJax) await MathJax.typesetPromise([box]);
    return;
  }


  // 2) Quadratic fallback: ensures two roots are shown when it is quadratic.
  let roots=solveQuadraticBySampling(left,right);
  if(roots.length){
    box.innerHTML=formatRootList(v,roots);
    if(window.MathJax) await MathJax.typesetPromise([box]);
    return;
  }

  // 3) Numeric search for rational equations and equations with x in denominator.
  roots=findNumericRoots(left,right);
  if(roots.length){
    let html=formatRootList(v,roots);
    const degree=getMaxPowerInRaw(raw,v);
    if(degree>2){
      const fact=factorLatexOfEquation(left,right,v);
      if(fact) html+='<div class="muted">Součinový tvar: \\('+fact+'=0\\)</div>';
    }
    box.innerHTML=html;
    if(window.MathJax) await MathJax.typesetPromise([box]);
    return;
  }

  // 4) Last fallback: linear.
  const ans=linearFallback(left,right);
  if(isValidEquationRoot(left,right,ans)){
    box.innerHTML='\\['+v+'='+fmtLatexNumber(ans)+'\\]';
  }else{
    box.innerHTML='<div class="muted">Řešení nenalezeno nebo je mimo definiční obor.</div>';
  }
  if(window.MathJax) await MathJax.typesetPromise([box]);

 }catch(e){
  box.innerHTML='<div class="muted">Tohle se nepodařilo spočítat.</div>';
 }
}
function logBaseValue(base,arg){
  base=Number(base); arg=Number(arg);
  if(!Number.isFinite(base)||!Number.isFinite(arg)||base<=0||Math.abs(base-1)<1e-12||arg<=0) return NaN;
  return Math.log(arg)/Math.log(base);
}
function evalJS(s,x){
 s=normalizeExpr(String(s))
   .replace(/\^/g,'**')
   .replace(/\bpi\b/g,'Math.PI')
   .replace(/\blogbase\(/g,'logBaseValue(')
   .replace(/\babs\(/g,'Math.abs(')
   .replace(/\bsqrt\(/g,'Math.sqrt(')
   .replace(/\bsin\(/g,'Math.sin(')
   .replace(/\bcos\(/g,'Math.cos(')
   .replace(/\btan\(/g,'Math.tan(')
   .replace(/\blog\(/g,'Math.log(')
   .replace(/\bln\(/g,'Math.log(');

}
function linearFallback(l,r){function f(x){return evalJS(l,x)-evalJS(r,x)}const b=f(0),a=f(1)-b;if(Math.abs(a)<1e-12)throw Error('not linear');return -b/a}
function fmt(n){const r=Math.round(n*1e9)/1e9;return Math.abs(r-Math.round(r))<1e-9?String(Math.round(r)):String(r).replace('.',',')}
function toks(raw){const out=[],re=/-?\d+(?:\.\d+)?/g;let m,idx=0;const preserved=preservedTokenIndexesForRaw(raw);while((m=re.exec(raw))){const bef=raw.slice(Math.max(0,m.index-3),m.index);if(bef.includes('^')){idx++;continue;}out.push({start:m.index,end:m.index+m[0].length,value:m[0],keep:preserved.has(idx)});idx++;}return out}
function repl(raw,rs){
  let o=raw;
  rs.sort((a,b)=>b.t.start-a.t.start).forEach(r=>{
    if(r.t&&r.t.keep)return;
    let v=String(r.v);

    // Důležité: tokeny typu -4 obsahují i znaménko mínus.
    // Když se -4 nahradí kladným číslem 5, nesmí vzniknout ...x^25...
    // Proto binární mínus měníme na explicitní +5.
    if(String(r.t.value).startsWith('-') && !v.startsWith('-')){
      const before=o.slice(0,r.t.start).trimEnd();
      const prev=before[before.length-1]||'';
      if(/[0-9a-zA-Z)\]]/.test(prev)) v='+'+v;
    }

    o=o.slice(0,r.t.start)+v+o.slice(r.t.end);
  });
  return o;
}
function coeffLimits(){
  let minCoeff=Number(document.getElementById('minCoeff')?.value||0);
  let maxCoeff=Number(document.getElementById('maxCoeff')?.value||80);
  minCoeff=Math.max(0,Math.floor(Math.abs(minCoeff)||0));
  maxCoeff=Math.max(1,Math.floor(Math.abs(maxCoeff)||80));
  if(minCoeff>maxCoeff){const tmp=minCoeff;minCoeff=maxCoeff;maxCoeff=tmp;}
  return {minCoeff,maxCoeff};
}
function getMutationDelta(){

function coefficientAllowedValue(n,allowZero=false){
  const {minCoeff,maxCoeff}=coeffLimits();
  if(!Number.isFinite(n)) return false;
  const a=Math.abs(n);
  if(a>maxCoeff) return false;
  if(a===0) return !!allowZero;
  return a>=minCoeff;
}
function applyCoeffLimits(q,fallbackSign=1){
  const {minCoeff,maxCoeff}=coeffLimits();
  if(!Number.isFinite(q)) q=fallbackSign<0?-1:1;
  if(q>maxCoeff) q=maxCoeff;
  if(q<-maxCoeff) q=-maxCoeff;
  if(q===0) q=fallbackSign<0?-Math.max(1,minCoeff):Math.max(1,minCoeff);
  if(Math.abs(q)<minCoeff) q=(q<0?-1:1)*minCoeff;
  if(q===0) q=fallbackSign<0?-1:1;
  return q;
}
function parseSimpleCoeffValue(s){
  s=String(s).trim();
  if(/^[-+]?\d+(?:\.\d+)?$/.test(s)) return Number(s);
  const m=s.match(/^([-+]?\d+(?:\.\d+)?)\/([-+]?\d+(?:\.\d+)?)$/);
  if(m){const a=Number(m[1]),b=Number(m[2]);return b? a/b:NaN;}
  return NaN;
}
function mutate(v,d){

 let k=0;
 for(let i=0;i<20;i++){k=Math.floor(Math.random()*(2*d+1))-d;if(k)break}
 let q=n+k;
 q=applyCoeffLimits(q,n<0?-1:1);

}

function equationLines(){

function getMaxPowerInRaw(raw, variable='x'){
  let max=raw.includes(variable)?1:0;
  const esc=variable.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const patterns=[
    new RegExp(esc+'\\s*\\^\\s*(?:\\(?\\s*)?(\\d+)', 'g'),
    new RegExp('\\('+esc+'\\)\\s*\\^\\s*\\(?\\s*(\\d+)', 'g')
  ];
  patterns.forEach(re=>{
    let m;
    while((m=re.exec(raw))!==null){
      const n=Number(m[1]);
      if(Number.isFinite(n)) max=Math.max(max,n);
    }
  });
  return max;
}

function factorLatexOfEquation(left,right,variable='x'){
  if(!window.nerdamer) return '';
  try{
    const expr=normalizeExpr('('+left+')-('+right+')');
    const fact=nerdamer('factor('+expr+')');
    return fact.toTeX();
  }catch(e){
    return '';
  }
}

function solveLinearSystemNumeric(A,b){
  const n=A.length;
  if(!n)return [];
  const m=A[0].length;
  const M=A.map((row,i)=>row.slice().concat([b[i]]));
  for(let col=0,row=0; col<m && row<n; col++,row++){
    let pivot=row;
    for(let r=row+1;r<n;r++){
      if(Math.abs(M[r][col])>Math.abs(M[pivot][col])) pivot=r;
    }
    if(Math.abs(M[pivot][col])<1e-10) return null;
    [M[row],M[pivot]]=[M[pivot],M[row]];
    const div=M[row][col];
    for(let j=col;j<=m;j++) M[row][j]/=div;
    for(let r=0;r<n;r++){
      if(r===row)continue;
      const f=M[r][col];
      for(let j=col;j<=m;j++) M[r][j]-=f*M[row][j];
    }
  }
  const sol=Array(m).fill(0);
  for(let i=0;i<m;i++) sol[i]=M[i][m];
  return sol;
}

function coefficientRowsForTargets(raw,tokens,adjustIdxs,fixedValues,targets){
  const rows=[], rhs=[];
  for(const x of targets){
    const full0=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
    adjustIdxs.forEach(i=>full0[i]=0);
    const expr0=repl(raw,tokens.map((t,i)=>({t,v:String(full0[i])})));
    const [l0,r0]=expr0.split('=');
    let c0;
    try{c0=evalJS(l0,x)-evalJS(r0,x)}catch(e){continue}
    const row=[];
    for(const adj of adjustIdxs){
      const full=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
      adjustIdxs.forEach(i=>full[i]=0);
      full[adj]=1;
      const expr1=repl(raw,tokens.map((t,i)=>({t,v:String(full[i])})));
      const [l1,r1]=expr1.split('=');
      let c1;
      try{c1=evalJS(l1,x)-evalJS(r1,x)}catch(e){c1=NaN}
      row.push(c1-c0);
    }
    if(row.every(v=>Math.abs(v)<1e-10)){
      if(Math.abs(c0)<1e-8) continue; // root is automatic for this shape
      return null;
    }
    rows.push(row);
    rhs.push(-c0);
  }
  return {rows,rhs};
}


function evalJSVars(s,vars,values){
  s=normalizeExpr(String(s))
    .replace(/\^/g,'**')
    .replace(/\bpi\b/g,'Math.PI')
    .replace(/\blogbase\(/g,'logBaseValue(')
   .replace(/\babs\(/g,'Math.abs(')
   .replace(/\bsqrt\(/g,'Math.sqrt(')
    .replace(/\bsin\(/g,'Math.sin(')
    .replace(/\bcos\(/g,'Math.cos(')
    .replace(/\btan\(/g,'Math.tan(')
    .replace(/\blog\(/g,'Math.log(')
    .replace(/\bln\(/g,'Math.log(');

}
function equationLineValueAt(eq,vars,values){
  const idx=eq.indexOf('=');
  if(idx<0)throw Error('missing equals');
  const l=eq.slice(0,idx), r=eq.slice(idx+1);
  return evalJSVars(l,vars,values)-evalJSVars(r,vars,values);
}
function sameTokenCountAndOperators(original,candidate){
  if(toks(original).length!==toks(candidate).length)return false;
  const mask=s=>String(s).replace(/-?\d+(?:\.\d+)?/g,'#');
  return mask(original).replace(/\s+/g,'')===mask(candidate).replace(/\s+/g,'');
}
function generateEquationLinePreserveShape(eq,vars,values,d){
  const tokens=toks(eq);
  if(tokens.length>GENERATOR_MAX_TOKENS || tokens.length<1)return null;
  const started=nowMs();
  for(let attempt=0; attempt<GENERATOR_MAX_ATTEMPTS; attempt++){
    if(generatorTimedOut(started))break;
    const adj=Math.floor(Math.random()*tokens.length);
    const fixedValues={};
    tokens.forEach((t,i)=>{ if(i!==adj) fixedValues[i]=mutate(t.value,d); });

    const full0=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
    full0[adj]=0;
    const expr0=repl(eq,tokens.map((t,i)=>({t,v:String(full0[i])})));
    let c0;
    try{c0=equationLineValueAt(expr0,vars,values)}catch(e){continue;}

    const full1=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
    full1[adj]=1;
    const expr1=repl(eq,tokens.map((t,i)=>({t,v:String(full1[i])})));
    let c1;
    try{c1=equationLineValueAt(expr1,vars,values)}catch(e){continue;}

    const denom=c1-c0;
    if(!Number.isFinite(denom) || Math.abs(denom)<1e-10)continue;
    const solved=-c0/denom;
    const txt=niceNumberString(solved);
    if(txt===null || txt==='0')continue;

    const vals=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:txt);
    const cand=repl(eq,tokens.map((t,i)=>({t,v:String(vals[i])})));
    if(!sameTokenCountAndOperators(eq,cand))continue;
    try{
      if(Math.abs(equationLineValueAt(cand,vars,values))<1e-8)return cand;
    }catch(e){}
  }
  return null;
}

function niceNumberString(n){
  if(!Number.isFinite(n)) return null;
  const r=Math.round(n);
  // Generátor má zachovat stejný tvar zápisu jako v editoru.
  // Proto sem nepouštíme zlomky typu 7/5, které by v hotové rovnici
  // vytvářely nový zlomek nebo složený zlomek, pokud ve vzoru nebyl.
  if(Math.abs(n-r)<1e-9 && coefficientAllowedValue(r)) return String(r);
  return null;
}

const GENERATOR_TIME_LIMIT_MS=1400;
const GENERATOR_YIELD_EVERY=120;
const GENERATOR_MAX_ATTEMPTS=8000;
const GENERATOR_SINGLE_ROOT_MAX_ATTEMPTS=8000;
function nowMs(){return performance && performance.now ? performance.now() : Date.now()}
function generatorTimedOut(start, limitMs=GENERATOR_TIME_LIMIT_MS){
  return nowMs()-start>limitMs;
}
function sleep0(){return new Promise(resolve=>setTimeout(resolve,0))}
async function generatorShouldStop(start, attempt, limitMs=GENERATOR_TIME_LIMIT_MS){

}
function generatorStoppedMessage(){

}

async function generateFactorableHigher(){
  const box=document.getElementById('generated');
  const raw=calcA(root);
  const tokens=toks(raw);
  if(tokens.length>GENERATOR_MAX_TOKENS){
    box.innerHTML='<div class="muted">Příklad je pro bezpečné generování příliš složitý. Zkus jednodušší tvar nebo méně čísel.</div>';
    return;
  }
  if(tokens.length<1){
    box.innerHTML='<div class="muted">U této rovnice není žádné číslo, které by šlo v generátoru změnit.</div>';
    return;
  }

  let targets=[];
  for(let i=0;i<6;i++){
    const t=readTarget(i);
    if(t!==null && !targets.some(x=>Math.abs(x-t)<1e-9)) targets.push(t);
  }
  if(!targets.length) targets=[randNonZero(-5,5)];

  const d=getMutationDelta();
  let best=null;
  const started=nowMs();

  for(let attempt=0; attempt<GENERATOR_MAX_ATTEMPTS && !best; attempt++){
    if(await generatorShouldStop(started,attempt)) break;
    const k=Math.min(Math.max(1,targets.length),tokens.length);
    const shuffled=tokens.map((_,i)=>i).sort(()=>Math.random()-.5);
    const adjustIdxs=shuffled.slice(0,k);
    const fixedValues={};
    tokens.forEach((t,i)=>{
      if(!adjustIdxs.includes(i)) fixedValues[i]=mutate(t.value,d);
    });

    const sys=coefficientRowsForTargets(raw,tokens,adjustIdxs,fixedValues,targets);
    if(!sys || !sys.rows.length) continue;
    if(sys.rows.length!==adjustIdxs.length) continue;

    const sol=solveLinearSystemNumeric(sys.rows,sys.rhs);
    if(!sol) continue;

    const vals=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
    let ok=true;
    sol.forEach((v,j)=>{
      const txt=niceNumberString(v);
      if(txt===null || txt==='0') ok=false;
      vals[adjustIdxs[j]]=txt;
    });
    if(!ok) continue;

    const cand=repl(raw,tokens.map((t,i)=>({t,v:String(vals[i])})));
    // Nepřidávej nový znak dělení: vygenerovaný příklad má mít stejný tvar
    // jako zápis v editoru, jen s jinými čísly.
    if((cand.match(/\//g)||[]).length !== (raw.match(/\//g)||[]).length) continue;
    try{
      const [l,r]=cand.split('=');
      const allOk=targets.every(x=>isValidEquationRoot(l,r,x));
      if(!allOk) continue;
      const roots=findNumericRoots(l,r);
      const fact=factorLatexOfEquation(l,r,'x');
      best={cand,roots,fact};
    }catch(e){}
  }

  if(!best){
    box.innerHTML=generatorStoppedMessage();
    return;
  }

  lastGeneratedCalc=prettifyUnitCoefficientsCalc(best.cand);
  lastGeneratedLatex=calcToLatexSimple(lastGeneratedCalc);
  let info='';
  if(best.roots && best.roots.length){
    info+='<div class="muted">Kořeny: \\('+best.roots.map((r,i)=>'x_{'+(i+1)+'} = '+fmtLatexNumber(r)).join('\\quad ')+'\\)</div>';
  }
  if(best.fact){
    info+='<div class="muted">Součinový tvar levá strana − pravá strana: \\('+best.fact+'=0\\)</div>';
  }
  box.innerHTML='\\['+lastGeneratedLatex+'\\]'+info;
  if(window.MathJax) await MathJax.typesetPromise([box]);
}

function detectGeneratorMode(){
 const raw=calcA(root);

 // Rovnice s absolutní hodnotou: v generátoru vždy jen jedno políčko x.
 // Absolutní rovnice často dávají interval nebo sjednocení intervalů; generátor
 // proto nesmí nabízet x₁…x₆ ani se přepnout do obecného „higher“ režimu.
 if(hasAbsExpr(raw) && raw.includes('=') && !hasInequality(raw)){
   return {type:'absEquation',count:1,labels:['x']};
 }

 if(hasLogarithmExpr(raw)){
   return {type:'logarithmic',count:1,labels:['x']};
 }

 if(hasInequality(raw)){
   const info=analyzeInequalityForGenerator(raw,'x');
   const count=Math.max(1,Math.min(info.zeroCount||1,6));
   const labels=[];
   for(let i=1;i<=count;i++) labels.push('n'+subDigit(i));
   return {type:'inequality',count,labels,zeroCount:count};
 }

 const lines=equationLines();
 if(lines.length===2)return {type:'system',count:2,labels:['x','y']};
 if(lines.length>=3)return {type:'system',count:3,labels:['x','y','z']};

 const degree=getMaxPowerInRaw(raw,'x');

 // Důležité: rovnice se zlomkem se nesmí přepnout do „kvadratické“ šablony,
 // protože by se tím úplně změnil tvar příkladu. Má se zachovat původní zápis
 // a měnit jen čísla v něm.
 if(raw.includes('/') && raw.includes('=')){
   let count=1;
   try{
     const parts=splitTopLevelEquation(raw);
     if(parts){
       const roots=solveAllNumericRootsRobust(parts[0],parts[1],'x');
       count=Math.max(1,Math.min(roots.length||1,6));
     }
   }catch(e){}
   const labels=[];
   for(let i=1;i<=count;i++) labels.push('x'+subDigit(i));
   return {type:'higher',count:labels.length,labels};
 }

 if(degree>2){
   const labels=[];
   for(let i=1;i<=Math.min(degree,6);i++) labels.push('x'+subDigit(i));
   return {type:'higher',count:labels.length,labels};
 }

 const looksQuadratic =
   raw.includes('^2') ||
   raw.includes('^(2)') ||
   raw.includes('x^2') ||
   raw.includes('(x)^(2)');

 if(looksQuadratic)return {type:'quadratic',count:2,labels:['x₁','x₂']};

 // Pro jednu nekvadratickou rovnici je jeden výsledek x.
 return {type:'single',count:1,labels:['x']};
}
function subDigit(n){

}

 });
 const hint=document.getElementById('targetHint');

 else if(mode.type==='logarithmic')hint.textContent='Rozpoznána logaritmická rovnice: zadej výsledek x. Generátor nezmění základ logaritmu, změní jen čísla v argumentu logaritmu a čísla/koeficienty mimo logaritmus.';
 else if(mode.type==='system')hint.textContent=`Rozpoznána soustava ${mode.count} rovnic: zadej ${mode.labels.join(', ')}. Prázdné hodnoty program zvolí.`;
 else if(mode.type==='quadratic')hint.textContent='Rozpoznána kvadratická rovnice: zadej jeden nebo oba kořeny. Generátor zachová stejný tvar rovnice, stejné strany i pořadí členů; změní jen čísla.';
 else if(mode.type==='higher')hint.textContent='Rozpoznána rovnice vyššího stupně: zadej kořen nebo kořeny. Generátor změní pouze čísla a znaménka, strany a mocniny nechá beze změny.';
 else if(mode.type==='absEquation')hint.textContent='Rozpoznána rovnice s absolutní hodnotou: zadej jeden požadovaný výsledek / kontrolní bod x. Výsledek může být kořen, interval nebo sjednocení intervalů.';
 else hint.textContent='Rozpoznána jedna rovnice: zadej požadovaný výsledek x.';
}
function parseTargetNumber(s){

function systemCalcFromMatrix(A,b,vars){

     const abs=Math.abs(c);
     // Koeficient 1 se před neznámou v zobrazení nepíše.
     const coeff=(abs===1)?'':String(abs);

function detectVariablePowersInEquation(eq, vars){
  // Returns per variable highest power in this equation: 1 or 2. Keeps the "shape" of powers.
  const powers={};
  vars.forEach(v=>{
    powers[v]=1;
    const patterns=[
      new RegExp(v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\^2'),
      new RegExp('\\('+v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\)\\^\\(2\\)'),
      new RegExp('\\('+v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\)\\^2')
    ];
    if(patterns.some(re=>re.test(eq))) powers[v]=2;
  });
  return powers;
}

  const out=[];
  for(let i=0;i<need;i++){

    if(val!==undefined && val!==null && !out.some(x=>Math.abs(x-val)<1e-9)) out.push(val);
  }
  if(!out.length && allTargets.length){

function buildFactorCalcFromTargets(targets,op,hasQuotient=false,denominatorTargets=[]){
  let points=targets.slice().filter(x=>Number.isFinite(x));
  if(!points.length) points=[randNonZero(-6,6)];
  points=dedupeRoots(points);
  let denRoots=denominatorTargets.slice().filter(x=>Number.isFinite(x));
  denRoots=dedupeRoots(denRoots);
  if(hasQuotient && !denRoots.length && points.length>=2){
    // Když nevíme, který bod je ze jmenovatele, vezmeme prostřední kritický bod.
    denRoots=[points[Math.floor(points.length/2)]];
  }
  const numRoots=hasQuotient ? points.filter(x=>!denRoots.some(d=>Math.abs(d-x)<1e-8)) : points;
  const a=randNonZero(1,5);
  const factor=x=>{
    const r=cleanEndpoint(x);
    if(r===0)return 'x';
    return '(x'+(r<0?'+'+Math.abs(r):'-'+r)+')';
  };
  let left=a+'*'+(numRoots.length?numRoots.map(factor).join('*'):'1');
  if(hasQuotient){
    left='(('+left+')/('+denRoots.map(factor).join('*')+'))';
  }
  return left+op+'0';
}
async function generateInequalityByLinearFit(line,targets,d){
  const parsed=opToEquation(line);
  if(!parsed || !targets.length)return null;
  const eqRaw=parsed.eq;
  const tokens=toks(eqRaw);
  if(tokens.length>GENERATOR_MAX_TOKENS)return null;
  if(tokens.length<1)return null;

  let best=null;
  const started=nowMs();
  for(let attempt=0; attempt<GENERATOR_MAX_ATTEMPTS && !best; attempt++){
    if(await generatorShouldStop(started,attempt)) break;
    const k=Math.min(Math.max(1,targets.length),tokens.length);
    const shuffled=tokens.map((_,i)=>i).sort(()=>Math.random()-.5);
    const adjustIdxs=shuffled.slice(0,k);
    const fixedValues={};
    tokens.forEach((t,i)=>{ if(!adjustIdxs.includes(i)) fixedValues[i]=mutate(t.value,d); });

    const sys=coefficientRowsForTargets(eqRaw,tokens,adjustIdxs,fixedValues,targets);
    if(!sys || !sys.rows.length || sys.rows.length!==adjustIdxs.length) continue;
    const sol=solveLinearSystemNumeric(sys.rows,sys.rhs);
    if(!sol) continue;

    const vals=tokens.map((t,i)=>fixedValues[i]!==undefined?fixedValues[i]:0);
    let ok=true;
    sol.forEach((v,j)=>{
      const txt=niceNumberString(v);
      if(txt===null || txt==='0') ok=false;
      vals[adjustIdxs[j]]=txt;
    });
    if(!ok) continue;

    const candEq=repl(eqRaw,tokens.map((t,i)=>({t,v:String(vals[i])})));
    try{
      const [l,r]=candEq.split('=');
      const allOk=targets.every(x=>isValidEquationRoot(l,r,x));
      if(!allOk) continue;
      const roots=solveAllNumericRootsRobust(l,r,'x');
      if(roots.length && roots.length>targets.length+2) continue;
      best=equationToInequality(candEq,parsed.op);
    }catch(e){}
  }
  return best;
}

    : calcToLatexSimple(lastGeneratedCalc);

  const intervals=solveInequalitySystem(lastGeneratedCalc,'x');
  const rootsInfo=[];
  generated.forEach(g=>{
    const p=parseInequalityLine(g);
    if(p){

      zs.forEach(z=>addUniqueNumber(rootsInfo,z));

  }
  info+='<div class="muted">Výsledek: \\('+intervalsToLatex(intervals,'x').replace(/^\\\[|\\\]$/g,'')+'\\)</div>';

  box.innerHTML='\\['+lastGeneratedLatex+'\\]'+info;
  if(window.MathJax)await MathJax.typesetPromise([box]);
}

function hasLogarithmExpr(raw){
  raw=String(raw||'');
  return raw.includes('logbase(') || /\blog\s*\(/.test(raw) || /\bln\s*\(/.test(raw);
}

function logbaseCallRanges(raw){
  raw=String(raw||'');
  const ranges=[];
  const head='logbase(';
  for(let i=0;i<raw.length;i++){
    if(raw.slice(i,i+head.length)!==head) continue;
    const innerStart=i+head.length;
    let depth=0, comma=-1, end=-1;
    for(let j=innerStart;j<raw.length;j++){
      const c=raw[j];
      if(c==='(') depth++;
      else if(c===')'){
        if(depth===0){end=j;break;}
        depth--;
      }else if(c===',' && depth===0 && comma<0){
        comma=j;
      }
    }
    if(comma>innerStart && end>comma){
      ranges.push({
        start:i,
        end:end+1,
        baseStart:innerStart,
        baseEnd:comma,
        argStart:comma+1,
        argEnd:end
      });
      i=end;
    }
  }
  return ranges;
}
function tokenInsideRange(t,r){
  return t.start>=r.baseStart && t.end<=r.baseEnd;
}
function tokenInsideAnyLogBase(t,ranges){
  return ranges.some(r=>tokenInsideRange(t,r));
}
function adjustableLogTokens(raw){
  const ranges=logbaseCallRanges(raw);
  return toks(raw).filter(t=>!t.keep && !tokenInsideAnyLogBase(t,ranges));
}
function hasChangedLogBases(original,candidate){
  const a=logbaseCallRanges(original).map(r=>original.slice(r.baseStart,r.baseEnd).trim());
  const b=logbaseCallRanges(candidate).map(r=>candidate.slice(r.baseStart,r.baseEnd).trim());
  if(a.length!==b.length) return true;
  return a.some((x,i)=>x!==b[i]);
}
function logarithmicCandidateReallyHasTargetRoot(candidate,target){
  try{
    const parts=splitTopLevelEquation(candidate);
    if(!parts) return false;
    const [l,r]=parts;
    const lv=evalJS(l,target), rv=evalJS(r,target);
    if(!Number.isFinite(lv)||!Number.isFinite(rv)||Math.abs(lv-rv)>1e-9) return false;

    // Nestačí jen formálně upravit koeficienty; zadaná hodnota musí po dosazení
    // opravdu splňovat rovnici. U mocnin logaritmů (např. (log_5(x))^2=4)
    // ale numerické skenování občas mine druhý kladný kořen, hlavně u hodnot
    // typu 1/5. Proto je přímé ověření dosazením pro logaritmickou rovnici
    // bezpečná pojistka: pokud target rovnici splňuje a logaritmus je v definičním
    // oboru, target je skutečný kořen.
    const roots=solveAllNumericRootsRobust(l,r,'x');
    if(roots.some(x=>Math.abs(x-target)<1e-7)) return true;
    return hasLogarithmExpr(candidate);
  }catch(e){
    return false;
  }
}

function prioritizedLogarithmicTargets(raw){
  // Pro rovnice s mocninou logaritmu nechceme začínat náhodně zápornými čísly.
  // Hezké cíle jsou mocniny základu: pro log_5(x) dává x=5,25,1/5...
  // a pravá strana pak vychází jako hezké čtverce 1,4,9...
  const out=[];
  function add(v){
    if(Number.isFinite(v) && v>0 && Math.abs(v)<1e9 && !out.some(x=>Math.abs(x-v)<1e-10)) out.push(v);
  }
  const ranges=logbaseCallRanges(raw);
  ranges.forEach(r=>{
    const b=Number(raw.slice(r.baseStart,r.baseEnd).trim());
    if(Number.isFinite(b) && b>0 && Math.abs(b-1)>1e-12){
      [1,2,3,-1,-2].forEach(k=>add(Math.pow(b,k)));
    }
  });
  shuffledPrettyTargets().forEach(add);
  return out;
}
